<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ALL IN Archery</title>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #FFD700; --card: #151515; --gray: #888; --red: #FF3B30; --yellow: #FFCC00; --green: #4CD964; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; padding-top: env(safe-area-inset-top); }
        
        .app-container { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; position: relative; direction: ltr; }
        
        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; background: var(--bg); position: absolute; width: 100%; top: 0; left: 0; bottom: 0; right: 0; }
        .active-screen { display: flex !important; z-index: 10; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 1px solid #222; min-height: 60px; }
        .header-center { flex: 2; text-align: center; padding: 0 5px; }
        .header-right { display: flex; gap: 15px; align-items: baseline; text-align: right; }
        
        .stat-label { font-size: 9px; color: var(--gray); font-weight: 800; letter-spacing: 0.5px; }
        .stat-val { font-size: 20px; font-weight: 900; }

        .timer-container { width: 100%; height: 4px; background: #222; display: none; position: relative; margin-top: -1px; }
        .timer-bar { height: 100%; background: var(--accent); width: 100%; transition: width 0.2s linear; }
        .timer-text { font-size: 14px; font-weight: 900; color: var(--accent); margin-top: 4px; }

        /* Target Face Mode Specifics */
        #target-container { width: 100%; aspect-ratio: 1/1; position: relative; margin: 20px 0; display: none; touch-action: none; }
        #target-canvas { width: 100%; height: 100%; background: #111; border-radius: 50%; }
        #magnifier { 
            position: absolute; width: 120px; height: 120px; border: 3px solid var(--accent); border-radius: 50%; 
            display: none; pointer-events: none; overflow: hidden; background: #000; z-index: 100;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #mag-canvas { width: 100%; height: 100%; }
        .crosshair { 
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; 
            border-top: 1px solid #fff; border-left: 1px solid #fff; 
            transform: translate(-50%, -50%); pointer-events: none;
        }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-card { background: var(--card); width: 85%; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        .modal-btn { background: #fff; color: #000; width: 100%; padding: 15px; border-radius: 12px; margin-top: 10px; font-weight: 800; border: none; }

        .logo-badge { width: 80px; height: 80px; background: var(--accent); color: #000; border-radius: 20px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; }
        .menu-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .menu-row { display: flex; gap: 10px; height: 75px; }
        .menu-btn { flex: 1; background: #fff; color: #000; padding: 0 20px; border-radius: 15px; font-size: 15px; font-weight: 800; border: none; text-align: left; }
        
        .history-btn { background: #1a1a1a; border-radius: 15px; width: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #333; color: #fff; cursor: pointer; }
        .home-footer { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; }
        .gear-link { display: flex; align-items: center; gap: 10px; color: var(--gray); background: #111; padding: 12px 25px; border-radius: 30px; border: 1px solid #222; cursor: pointer; }

        #score-list, #history-list, #detail-list, #gear-list { flex-grow: 1; overflow-y: auto; padding: 15px 0; display: flex; flex-direction: column; gap: 8px; }
        .end-card { background: var(--card); padding: 12px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .history-row { position: relative; width: 100%; min-height: 55px; border-radius: 10px; overflow: hidden; background: #000; }
        .history-card { position: relative; z-index: 2; background: var(--card); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; border-radius: 10px; transition: transform 0.3s ease; touch-action: pan-y; }
        .bin-btn { position: absolute; right: 0; top: 0; bottom: 0; width: 70px; background: var(--red); display: flex; align-items: center; justify-content: center; z-index: 1; color: #fff; font-size: 20px; }

        .next-btn { background: var(--accent); color: #000; width: 100%; padding: 18px; border-radius: 12px; font-size: 20px; font-weight: 900; border: none; margin-top: 15px; }
        .next-btn:disabled { background: #333; color: #666; }
        .action-row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 15px; }
        .secondary-btn { background: #333; color: #fff; padding: 18px; border-radius: 12px; font-size: 14px; font-weight: 800; border: none; }
        
        .btn-grid { display: grid; gap: 8px; margin-top: 10px; }
        .score-btn { height: 60px; border-radius: 12px; border: 1px solid #333; font-size: 22px; font-weight: 900; color: #fff; background: #222; }

        .stats-card { background: var(--card); border-radius: 12px; padding: 12px 15px; border: 1px solid #222; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center; }
        .chart-box { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #222; margin-top: 8px; }
        .hits-chart { display: grid; gap: 4px; text-align: center; margin-top: 5px; height: 110px; align-items: end; }
        .hit-bar { width: 100%; background: #222; border-radius: 2px; height: 75px; position: relative; overflow: hidden;}
        .hit-fill { position: absolute; bottom: 0; left: 0; right: 0; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="mode-modal" class="modal-overlay">
        <div class="modal-card">
            <h2 id="l-mode-select">Select Scoring Mode</h2>
            <button class="modal-btn" onclick="confirmMode('pad')">PAD MODE</button>
            <button class="modal-btn" onclick="confirmMode('face')">TARGET FACE</button>
        </div>
    </div>

    <div id="home" class="screen active-screen">
        <div style="text-align:center; margin-top:40px;">
            <div class="logo-badge">AI</div>
            <div style="font-size:32px; font-weight:900; letter-spacing:6px;">ALL IN</div>
            <p id="l-tagline" style="color:var(--gray); font-size:12px;"></p>
        </div>
        <div class="menu-list" id="main-menu"></div>
        <div class="home-footer"><div class="gear-link" onclick="showGearScreen()"><span>⚙️</span><span id="l-gear-link" class="gear-text">Gear / Setup</span></div></div>
    </div>

    <div id="scoring" class="screen">
        <header>
            <button onclick="exitScoring()" style="background:none; border:none; color:var(--gray); font-size:22px;">✕</button>
            <div class="header-center">
                <div id="mode-display" style="color:#fff; font-weight:800; text-transform:uppercase; font-size:11px;"></div>
                <div id="t-text" class="timer-text"></div>
            </div>
            <div class="header-right">
                <button id="timer-btn" onclick="toggleTimer()" style="background:none; border:none; color:var(--gray); font-size:20px;">⏰</button>
                <div style="display:flex; flex-direction:column;"><span id="l-avg" class="stat-label"></span><span id="avg-score" class="stat-val">0.0</span></div>
                <div style="display:flex; flex-direction:column;"><span id="l-total" class="stat-label"></span><span id="total-score" class="stat-val" style="color:var(--accent);">0</span></div>
            </div>
        </header>
        <div class="timer-container" id="t-cont"><div class="timer-bar" id="t-bar"></div></div>
        
        <div id="score-list"></div>

        <div id="target-container">
            <canvas id="target-canvas"></canvas>
            <div id="magnifier"><canvas id="mag-canvas"></canvas><div class="crosshair"></div></div>
        </div>

        <div style="padding-bottom:30px; border-top: 1px solid #222;">
            <div id="action-area">
                <button id="next-btn" class="next-btn" onclick="handleMainAction()"></button>
            </div>
            <div id="button-grid" class="btn-grid"></div>
        </div>
    </div>

    <div id="history-screen" class="screen">
        <header><button onclick="showScreen('home')" style="background:none; border:none; color:var(--gray); font-size:22px;">✕</button><div class="header-center"><div id="history-title" class="stat-label" style="color:#fff;"></div></div><button id="l-clear" onclick="clearHistory()" style="background:none; border:none; color:var(--gray); font-size:10px; font-weight:bold;"></button></header>
        <div id="history-list"></div>
    </div>
    <div id="gear-screen" class="screen">
        <header><button onclick="showScreen('home')" style="background:none; border:none; color:var(--gray); font-size:22px;">✕</button><div class="header-center"><div class="stat-label" style="color:#fff;">MY SETUP</div></div><button onclick="saveGear()" style="background:none; border:none; color:var(--accent); font-weight:bold;">SAVE</button></header>
        <div id="gear-list"></div>
    </div>
</div>

<script>
    const i18n = {
        en: { tagline: "ARCHERY TRACKER", avg: "AVG", total: "TOTAL", next: "NEXT END", update: "UPDATE END", finish: "FINISH SESSION", exit: "Exit?", correct: "CORRECT", modes: ["3D PRACTICE", "FIELD PRACTICE", "TARGET INDOOR", "TARGET OUTDOOR"] },
        he: { tagline: "מעקב קליעה בקשת", avg: "ממוצע", total: "סה״כ", next: "סבב הבא", update: "עדכן סבב", finish: "סיים אימון", exit: "לצאת?", correct: "תיקון", modes: ["3D", "פילד", "טארגט אולם", "טארגט חוץ"] }
    };

    let state = { current: [], history: [], arrows: 2, ends: 24, mode: '', inputMode: 'pad', lang: 'en', pins: [] };
    let timer = { interval: null, timeLeft: 0, totalTime: 0, active: false, phase: 'READY', startTime: null };
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function toggleLang(lang) {
        state.lang = lang;
        document.getElementById('l-tagline').innerText = i18n[lang].tagline;
        document.getElementById('l-avg').innerText = i18n[lang].avg;
        document.getElementById('l-total').innerText = i18n[lang].total;
        renderMainMenu();
    }

    function renderMainMenu() {
        const menu = document.getElementById('main-menu');
        menu.innerHTML = '';
        const mNames = i18n[state.lang].modes;
        const rawNames = i18n.en.modes;
        const configs = [[2, 24], [3, 24], [3, 20], [6, 12]];
        rawNames.forEach((name, i) => {
            menu.insertAdjacentHTML('beforeend', `<div class="menu-row"><button class="menu-btn" onclick="startAppPre('${name}', ${configs[i][0]}, ${configs[i][1]})">${mNames[i]}</button><button class="history-btn" onclick="showHistory('${name}')">📜</button></div>`);
        });
    }

    let pendingAppArgs = null;
    function startAppPre(mode, arrows, ends) {
        pendingAppArgs = { mode, arrows, ends };
        if (mode.includes('TARGET')) {
            document.getElementById('mode-modal').style.display = 'flex';
        } else {
            confirmMode('pad');
        }
    }

    function confirmMode(m) {
        state.inputMode = m;
        document.getElementById('mode-modal').style.display = 'none';
        startApp(pendingAppArgs.mode, pendingAppArgs.arrows, pendingAppArgs.ends);
    }

    function startApp(mode, arrows, ends) {
        state.current = []; state.history = []; state.arrows = arrows; state.ends = ends; state.mode = mode; state.pins = [];
        document.getElementById('target-container').style.display = (state.inputMode === 'face') ? 'block' : 'none';
        document.getElementById('button-grid').style.display = (state.inputMode === 'face') ? 'none' : 'grid';
        if (state.inputMode === 'face') initTargetFace();
        renderButtons(); renderUI(); showScreen('scoring');
    }

    /* Target Face Canvas Engine */
    const tCanvas = document.getElementById('target-canvas');
    const tCtx = tCanvas.getContext('2d');
    const mCanvas = document.getElementById('mag-canvas');
    const mCtx = mCanvas.getContext('2d');
    const magnifier = document.getElementById('magnifier');

    function initTargetFace() {
        const size = tCanvas.parentElement.clientWidth;
        tCanvas.width = tCanvas.height = size;
        mCanvas.width = mCanvas.height = 120;
        drawTarget(tCtx, size);
        
        tCanvas.addEventListener('touchstart', handleTouchStart, {passive: false});
        tCanvas.addEventListener('touchmove', handleTouchMove, {passive: false});
        tCanvas.addEventListener('touchend', handleTouchEnd, {passive: false});
    }

    function drawTarget(ctx, size, pins = []) {
        const center = size / 2;
        const ringWidth = size / 22; // 10 rings + X
        const colors = ['#FFF176', '#FFF176', '#FF3B30', '#FF3B30', '#007AFF', '#007AFF', '#333', '#333', '#FFF', '#FFF'];
        
        ctx.clearRect(0,0,size,size);
        for(let i=10; i>=1; i--) {
            ctx.beginPath();
            ctx.arc(center, center, i * ringWidth, 0, Math.PI*2);
            ctx.fillStyle = colors[10-i];
            ctx.fill();
            ctx.strokeStyle = (i > 2) ? '#000' : '#888';
            ctx.stroke();
        }
        // X-Ring
        ctx.beginPath(); ctx.arc(center, center, 0.5 * ringWidth, 0, Math.PI*2); ctx.stroke();

        pins.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
            ctx.fillStyle = 'black'; ctx.fill();
            ctx.strokeStyle = 'white'; ctx.lineWidth = 1; ctx.stroke();
        });
    }

    let isTouching = false;
    let touchPos = {x:0, y:0};

    function handleTouchStart(e) {
        if (state.current.length >= state.arrows) return;
        isTouching = true;
        updateTouchPos(e);
        magnifier.style.display = 'block';
        updateMagnifier();
    }

    function handleTouchMove(e) {
        if (!isTouching) return;
        e.preventDefault();
        updateTouchPos(e);
        updateMagnifier();
    }

    function handleTouchEnd() {
        if (!isTouching) return;
        isTouching = false;
        magnifier.style.display = 'none';
        
        const size = tCanvas.width;
        const dist = Math.sqrt(Math.pow(touchPos.x - size/2, 2) + Math.pow(touchPos.y - size/2, 2));
        const ringWidth = size / 22;
        
        let score = 0;
        if (dist <= 0.5 * ringWidth) score = 'X';
        else {
            score = 10 - Math.floor((dist - 0.5 * ringWidth) / ringWidth);
            if (score < 0) score = 0;
        }

        state.current.push(score);
        state.pins.push({...touchPos});
        drawTarget(tCtx, size, state.pins);
        renderUI();
    }

    function updateTouchPos(e) {
        const rect = tCanvas.getBoundingClientRect();
        touchPos.x = e.touches[0].clientX - rect.left;
        touchPos.y = e.touches[0].clientY - rect.top;
        magnifier.style.left = (touchPos.x - 60) + 'px';
        magnifier.style.top = (touchPos.y - 140) + 'px';
    }

    function updateMagnifier() {
        mCtx.fillStyle = '#000';
        mCtx.fillRect(0,0,120,120);
        mCtx.save();
        mCtx.translate(60 - touchPos.x * 2, 60 - touchPos.y * 2);
        mCtx.scale(2, 2);
        drawTarget(mCtx, tCanvas.width, state.pins);
        mCtx.restore();
    }

    function correctScore() {
        state.current.pop();
        state.pins.pop();
        drawTarget(tCtx, tCanvas.width, state.pins);
        renderUI();
    }

    /* Standard logic remains same */
    function handleMainAction() {
        if(state.current.length === state.arrows) {
            const newEnd = { rawScores: [...state.current], displayScores: [...state.current].map(s => s === 0 ? 'M' : s), total: state.current.reduce((a, b) => a + getVal(b), 0), pins: [...state.pins] };
            state.history.push(newEnd);
            state.current = []; state.pins = [];
            if (state.inputMode === 'face') drawTarget(tCtx, tCanvas.width);
            if(state.history.length >= state.ends) saveSession(); else renderUI();
        }
    }

    function renderUI() {
        const t = i18n[state.lang];
        const histTot = state.history.reduce((acc, end) => acc + end.total, 0);
        const curTot = state.current.reduce((a, b) => a + getVal(b), 0);
        document.getElementById('total-score').innerText = histTot + curTot;
        document.getElementById('avg-score').innerText = ((histTot + curTot) / ((state.history.length * state.arrows) + state.current.length || 1)).toFixed(1);
        
        const list = document.getElementById('score-list');
        list.innerHTML = '';
        state.history.forEach((end, i) => {
            list.insertAdjacentHTML('beforeend', `<div class="end-card"><div><div class="stat-label">END ${i+1}</div><b>${end.displayScores.join(' · ')}</b></div><div style="color:var(--accent); font-weight:900; font-size:20px;">${end.total}</div></div>`);
        });

        const actArea = document.getElementById('action-area');
        if (state.inputMode === 'face') {
            actArea.innerHTML = `<div class="action-row">
                <button id="next-btn" class="next-btn" onclick="handleMainAction()" ${state.current.length < state.arrows ? 'disabled' : ''}>${t.next}</button>
                <button class="secondary-btn" onclick="correctScore()">${t.correct}</button>
            </div>`;
        } else {
            actArea.innerHTML = `<button id="next-btn" class="next-btn" onclick="handleMainAction()" ${state.current.length < state.arrows ? 'disabled' : ''}>${t.next}</button>`;
        }
        list.scrollTop = list.scrollHeight;
    }

    function getVal(s) { return s === 'X' ? 10 : (parseInt(s) || 0); }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen')); document.getElementById(id).classList.add('active-screen'); }
    function exitScoring() { if(confirm(i18n[state.lang].exit)) showScreen('home'); }

    // Audio bip logic from previous version
    function playBip(count) {
        if (!state.mode.includes('TARGET')) return;
        for(let i=0; i<count; i++) {
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = "sine"; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime + 0.45);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }, i * 900);
        }
    }

    window.onload = () => { toggleLang(localStorage.getItem('archer_lang') || 'en'); };
</script>
</body>
</html>
