<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>All In Archery</title>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #FFD700; --card: #151515; --gray: #888; --red: #FF3B30; --yellow: #FFCC00; --green: #4CD964; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; padding-top: env(safe-area-inset-top); }
        .app-container { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; position: relative; direction: ltr; }
        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; background: var(--bg); position: absolute; width: 100%; top: 0; left: 0; bottom: 0; right: 0; }
        .active-screen { display: flex !important; z-index: 10; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 1px solid #222; min-height: 60px; }
        .header-center { flex: 2; text-align: center; padding: 0 5px; }
        .header-right { display: flex; gap: 15px; align-items: baseline; text-align: right; }
        .stat-label { font-size: 9px; color: var(--gray); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }
        .stat-val { font-size: 20px; font-weight: 900; }
        .timer-container { width: 100%; height: 4px; background: #222; display: none; position: relative; margin-top: -1px; }
        .timer-bar { height: 100%; background: var(--accent); width: 100%; transition: width 0.2s linear; }
        .timer-text { font-size: 14px; font-weight: 900; color: var(--accent); margin-top: 4px; }
        .logo-badge { width: 80px; height: 80px; background: var(--accent); color: #000; border-radius: 20px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; }
        .menu-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .menu-row { display: flex; gap: 10px; height: 75px; }
        .menu-btn { flex: 1; background: #fff; color: #000; padding: 0 20px; border-radius: 15px; font-size: 15px; font-weight: 800; border: none; text-align: left; }
        .history-btn { background: #1a1a1a; border-radius: 15px; width: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #333; color: #fff; cursor: pointer; }
        .home-footer { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; }
        .gear-link { display: flex; align-items: center; gap: 10px; color: var(--gray); background: #111; padding: 12px 25px; border-radius: 30px; border: 1px solid #222; cursor: pointer; }
        .gear-text { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        #score-list, #history-list, #detail-list, #gear-list { flex-grow: 1; overflow-y: auto; padding: 15px 0; display: flex; flex-direction: column; gap: 8px; }
        .end-card { background: var(--card); padding: 12px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .history-row { position: relative; width: 100%; min-height: 55px; border-radius: 10px; overflow: hidden; background: #000; }
        .history-card { position: relative; z-index: 2; background: var(--card); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; border-radius: 10px; transition: transform 0.3s ease; touch-action: pan-y; }
        .bin-btn { position: absolute; right: 0; top: 0; bottom: 0; width: 70px; background: var(--red); display: flex; align-items: center; justify-content: center; z-index: 1; color: #fff; font-size: 20px; }
        .clickable-end { cursor: pointer; border-left: 3px solid transparent; transition: 0.2s; }
        .next-btn { background: var(--accent); color: #000; width: 100%; padding: 18px; border-radius: 12px; font-size: 20px; font-weight: 900; border: none; margin-top: 15px; }
        .next-btn:disabled { background: #333; color: #666; }
        .control-row { display: flex; gap: 10px; margin-top: 15px; align-items: center; }
        .back-btn { background: #444; color: #fff; width: 75px; padding: 18px; border-radius: 12px; font-size: 20px; font-weight: 900; border: none; flex-shrink: 0; }
        .btn-grid { display: grid; gap: 8px; margin-top: 10px; }
        .score-btn { height: 60px; border-radius: 12px; border: 1px solid #333; font-size: 22px; font-weight: 900; color: #fff; background: #222; }
        .gear-input { background: #111; border: 1px solid #222; color: #fff; padding: 10px; border-radius: 8px; font-size: 14px; outline: none; width: 100%; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
        #face-container { width: 100%; aspect-ratio: 1; position: relative; margin: 10px 0; touch-action: none; overflow: hidden; border-radius: 10px; background: #0a0a0a; border: 1px solid #222;}
        #float-score { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); font-weight: 900; font-size: 24px; color: #fff; text-shadow: 0 0 8px #000; }

        /* --- NEW MULTI-PARTICIPANT STYLES --- */
        .participant-choice { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .count-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); background: none; color: #fff; font-size: 18px; font-weight: 900; }
        .count-btn.active { background: var(--accent); color: #000; }
        .name-input-list { display: flex; flex-direction: column; gap: 10px; width: 80%; align-items: center; margin: 0 auto; }
        .archer-tabs { display: none; gap: 5px; padding: 10px 20px; background: #000; overflow-x: auto; border-bottom: 1px solid #222; }
        .archer-tab { padding: 8px 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px 10px 0 0; color: var(--gray); font-size: 11px; font-weight: 800; white-space: nowrap; }
        .archer-tab.active { background: #151515; border-color: var(--accent); color: var(--accent); }
        .group-indicator { font-size: 10px; color: var(--accent); margin-left: 5px; font-weight: 900; }
    </style>
</head>
<body>
<div class="app-container">
    <div id="target-choice-modal" class="modal-overlay">
        <h2 style="font-weight: 900; letter-spacing: 1px;">TARGET SCORING</h2>
        <button class="next-btn" style="width:80%;" onclick="confirmTargetMode('pad')">SCORING BY PAD</button>
        <button class="next-btn" style="width:80%; background:#fff;" onclick="confirmTargetMode('face')">SCORING BY FACE</button>
    </div>

    <div id="participant-modal" class="modal-overlay">
        <h2 style="font-weight: 900;">HOW MANY ARCHERS?</h2>
        <div class="participant-choice">
            <button class="count-btn active" onclick="setParticipantCount(1, this)">1</button>
            <button class="count-btn" onclick="setParticipantCount(2, this)">2</button>
            <button class="count-btn" onclick="setParticipantCount(3, this)">3</button>
            <button class="count-btn" onclick="setParticipantCount(4, this)">4</button>
        </div>
        <div id="name-inputs" class="name-input-list"></div>
        <button class="next-btn" style="width:80%; margin-top:30px;" onclick="confirmParticipants()">START SESSION</button>
    </div>

    <div id="home" class="screen active-screen">
        <div style="text-align:center; margin-top:40px;">
            <div class="logo-badge">AI</div>
            <div style="font-size:32px; font-weight:900; letter-spacing:6px;">ALL IN</div>
            <p id="l-tagline" style="color:var(--gray); font-size:12px;"></p>
        </div>
        <div class="menu-list" id="main-menu"></div>
        <div class="home-footer"><div class="gear-link" onclick="showGearScreen()"><span>⚙️</span><span id="l-gear-link" class="gear-text"></span></div></div>
    </div>

    <div id="scoring" class="screen" style="padding:0;">
        <header style="padding: 10px 20px;">
            <button onclick="exitScoring()" style="background:none; border:none; color:var(--gray); font-size:22px;">✕</button>
            <div class="header-center">
                <div id="mode-display" style="color:#fff; font-weight:800; text-transform:uppercase; font-size:11px;"></div>
                <div id="t-text" class="timer-text"></div>
            </div>
            <div class="header-right">
                <button id="timer-btn" onclick="toggleTimer()" style="background:none; border:none; color:var(--gray); font-size:20px;">⏰</button>
                <div style="display:flex; flex-direction:column;"><span id="l-avg" class="stat-label"></span><span id="avg-score" class="stat-val">0.0</span></div>
                <div style="display:flex; flex-direction:column;"><span id="l-total" class="stat-label"></span><span id="total-score" class="stat-val" style="color:var(--accent);">0</span></div>
            </div>
        </header>
        <div id="archer-tabs" class="archer-tabs"></div>
        <div class="timer-container" id="t-cont"><div class="timer-bar" id="t-bar"></div></div>
        <div id="score-list" style="padding: 15px 20px;"></div>
        <div style="padding: 0 20px 30px; border-top: 1px solid #222;">
            <div class="control-row">
                <button id="back-btn" class="back-btn" onclick="undoLastMarker()">⌫</button>
                <button id="next-btn" class="next-btn" style="margin-top:0;" onclick="handleMainAction()"></button>
            </div>
            <div id="button-grid" class="btn-grid"></div>
        </div>
    </div>

    </div>

<script>
    const i18n = {
        en: { modes: ["3D Practice", "Field Practice", "Target Outdoor", "Target Indoor"], next: "NEXT END", finish: "FINISH", update: "UPDATE", prep: "PREP", exit: "Exit session?", wipe: "Clear history?", delSess: "Delete session?", total: "TOTAL", avg: "AVG", detail: "SESSION DETAIL", history: "HISTORY", stamina: "STAMINA", hits: "HITS", arrowsS: "ARROWS", heatmap: "HEATMAP" },
        he: { modes: ["אימון תלת מימד", "אימון שדה", "מטרה חוץ", "מטרה פנים"], next: "סבב הבא", finish: "סיום", update: "עדכון", prep: "הכנה", exit: "לצאת מהסבב?", wipe: "למחוק היסטוריה?", delSess: "למחוק סשן?", total: "סה״כ", avg: "ממוצע", detail: "פירוט סשן", history: "היסטוריה", stamina: "עמידות", hits: "פגיעות", arrowsS: "חצים", heatmap: "מפת פגיעות" }
    };

    let state = { lang: 'en', mode: '', arrows: 0, ends: 0, current: [], history: [], markers: [], scoringType: 'pad', editingIndex: -1, participantNames: [], activeArcherIdx: 0, participants: [] };
    let timer = { active: false, interval: null, timeLeft: 0, totalTime: 0, phase: 'READY', startTime: 0 };
    let targetSelectionState = null;
    let pendingStart = {};
    let selectedParticipantCount = 1;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function toggleLang(lang) {
        state.lang = lang; localStorage.setItem('archer_lang', lang);
        document.body.dir = lang === 'he' ? 'rtl' : 'ltr';
        const t = i18n[lang];
        document.getElementById('l-tagline').innerText = lang === 'en' ? 'PRECISION SCORING' : 'ניקוד מדויק';
        document.getElementById('l-gear-link').innerText = lang === 'en' ? 'GEAR & SETUP' : 'ציוד והגדרות';
        document.getElementById('l-avg').innerText = t.avg;
        document.getElementById('l-total').innerText = t.total;
        renderMainMenu();
    }

    function renderMainMenu() {
        const menu = document.getElementById('main-menu'); menu.innerHTML = '';
        i18n.en.modes.forEach((m, i) => {
            const row = document.createElement('div'); row.className = 'menu-row';
            const arrows = m.includes('3D') ? 2 : 3, ends = 10;
            row.innerHTML = `<button class="menu-btn" onclick="startApp('${m}', ${arrows}, ${ends})">${i18n[state.lang].modes[i]}</button><div class="history-btn" onclick="showHistory('${m}')"><span>📜</span><span style="font-size:9px; font-weight:800; margin-top:4px;">${i18n[state.lang].history}</span></div>`;
            menu.appendChild(row);
        });
    }

    function startApp(mode, arrows, ends) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        pendingStart = { mode, arrows, ends };
        setParticipantCount(1);
        document.getElementById('participant-modal').style.display = 'flex';
    }

    function setParticipantCount(num, btn) {
        selectedParticipantCount = num;
        document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        else document.querySelectorAll('.count-btn')[num-1].classList.add('active');

        const container = document.getElementById('name-inputs');
        container.innerHTML = '';
        for(let i=1; i<=num; i++) {
            container.innerHTML += `<input type="text" id="p-name-${i}" class="gear-input" style="text-align:center; margin-bottom:5px;" placeholder="Archer ${i}">`;
        }
    }

    function confirmParticipants() {
        const names = [];
        for(let i=1; i<=selectedParticipantCount; i++) {
            const val = document.getElementById(`p-name-${i}`).value;
            names.push(val || `Archer ${i}`);
        }
        state.participantNames = names;
        state.activeArcherIdx = 0;
        document.getElementById('participant-modal').style.display = 'none';

        if (pendingStart.mode.includes('TARGET')) {
            targetSelectionState = { ...pendingStart };
            document.getElementById('target-choice-modal').style.display = 'flex';
        } else {
            initScoring(pendingStart.mode, pendingStart.arrows, pendingStart.ends, 'pad');
        }
    }

    function initScoring(mode, arrows, ends, type) {
        state.current = []; state.history = []; state.arrows = arrows; state.ends = ends; state.mode = mode; state.editingIndex = -1; state.scoringType = type; state.markers = [];
        
        state.participants = state.participantNames.map(name => ({
            name: name,
            history: [],
            current: [],
            markers: []
        }));

        stopTimer();
        renderTabs();
        if (type === 'face') renderTargetFace(); else renderButtons();
        renderUI(); showScreen('scoring');
    }

    function renderTabs() {
        const tabCont = document.getElementById('archer-tabs');
        if(state.participants.length > 1) {
            tabCont.style.display = 'flex';
            tabCont.innerHTML = state.participants.map((p, i) => 
                `<div class="archer-tab ${i === state.activeArcherIdx ? 'active' : ''}">${p.name}</div>`
            ).join('');
        } else {
            tabCont.style.display = 'none';
        }
    }

    // Existing functions (playBip, toggleTimer, renderUI, etc.) stay the same...
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen')); document.getElementById(id).classList.add('active-screen'); }
    function stopTimer() { clearInterval(timer.interval); timer.active = false; timer.phase = 'READY'; document.getElementById('t-cont').style.display = 'none'; }
    function exitScoring() { if(confirm(i18n[state.lang].exit)) { stopTimer(); showScreen('home'); } }

    window.onload = () => { 
        const savedLang = localStorage.getItem('archer_lang') || 'en'; 
        toggleLang(savedLang); 
    };
</script>
</body>
</html>
