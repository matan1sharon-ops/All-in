<style>
    :root { --bg: #000; --text: #fff; --accent: #FFD700; --card: #151515; --gray: #888; --red: #FF3B30; --yellow: #FFCC00; --green: #4CD964; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; padding-top: env(safe-area-inset-top); }
    .app-container { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; position: relative; direction: ltr; }
    .screen { display: none; flex-direction: column; height: 100%; padding: 20px; background: var(--bg); position: absolute; width: 100%; top: 0; left: 0; bottom: 0; right: 0; }
    .active-screen { display: flex !important; z-index: 10; }
    header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 1px solid #222; min-height: 60px; }
    .header-center { flex: 2; text-align: center; padding: 0 5px; }
    .header-right { display: flex; gap: 15px; align-items: baseline; text-align: right; }
    .stat-label { font-size: 9px; color: var(--gray); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }
    .stat-val { font-size: 20px; font-weight: 900; }
    .timer-container { width: 100%; height: 4px; background: #222; display: none; position: relative; margin-top: -1px; }
    .timer-bar { height: 100%; background: var(--accent); width: 100%; transition: width 0.2s linear; }
    .timer-text { font-size: 14px; font-weight: 900; color: var(--accent); margin-top: 4px; }
    .logo-badge { width: 80px; height: 80px; background: var(--accent); color: #000; border-radius: 20px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; }
    .menu-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
    .menu-row { display: flex; gap: 10px; height: 75px; }
    .menu-btn { flex: 1; background: #fff; color: #000; padding: 0 20px; border-radius: 15px; font-size: 15px; font-weight: 800; border: none; text-align: left; }
    .history-btn { background: #1a1a1a; border-radius: 15px; width: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #333; color: #fff; cursor: pointer; }
    .home-footer { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; }
    .gear-link { display: flex; align-items: center; gap: 10px; color: var(--gray); background: #111; padding: 12px 25px; border-radius: 30px; border: 1px solid #222; cursor: pointer; }
    .gear-text { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
    #score-list, #history-list, #detail-list, #gear-list { flex-grow: 1; overflow-y: auto; padding: 15px 0; display: flex; flex-direction: column; gap: 8px; }
    .end-card { background: var(--card); padding: 12px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
    .history-row { position: relative; width: 100%; min-height: 55px; border-radius: 10px; overflow: hidden; background: #000; }
    .history-card { position: relative; z-index: 2; background: var(--card); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; border-radius: 10px; transition: transform 0.3s ease; touch-action: pan-y; }
    .bin-btn { position: absolute; right: 0; top: 0; bottom: 0; width: 70px; background: var(--red); display: flex; align-items: center; justify-content: center; z-index: 1; color: #fff; font-size: 20px; }
    .clickable-end { cursor: pointer; border-left: 3px solid transparent; transition: 0.2s; }
    .next-btn { background: var(--accent); color: #000; width: 100%; padding: 18px; border-radius: 12px; font-size: 20px; font-weight: 900; border: none; margin-top: 15px; }
    .next-btn:disabled { background: #333; color: #666; }
    .control-row { display: flex; gap: 10px; margin-top: 15px; align-items: center; }
    .back-btn { background: #444; color: #fff; width: 75px; padding: 18px; border-radius: 12px; font-size: 20px; font-weight: 900; border: none; flex-shrink: 0; }
    .btn-grid { display: grid; gap: 8px; margin-top: 10px; }
    .score-btn { height: 60px; border-radius: 12px; border: 1px solid #333; font-size: 22px; font-weight: 900; color: #fff; background: #222; }
    .gear-section-title { font-size: 12px; font-weight: 900; color: var(--accent); margin: 20px 0 10px; text-transform: uppercase; border-left: 3px solid var(--accent); padding-left: 10px; }
    .gear-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .gear-input-group { display: flex; flex-direction: column; }
    .gear-label { font-size: 9px; font-weight: 900; color: #bbb; margin-bottom: 4px; text-transform: uppercase; }
    .gear-input { background: #111; border: 1px solid #222; color: #fff; padding: 10px; border-radius: 8px; font-size: 14px; outline: none; width: 100%; }
    .crawl-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #0a0a0a; padding: 12px; border-radius: 12px; border: 1px solid #1a1a1a; }
    .crawl-item { text-align: center; }
    .crawl-dist { font-size: 9px; font-weight: 900; color: #bbb; margin-bottom: 4px; }
    .crawl-val { background: #1a1a1a; border: 1px solid #333; color: var(--accent); width: 100%; text-align: center; padding: 5px 0; border-radius: 5px; font-size: 12px; font-weight: bold; }
    .stats-card { background: var(--card); border-radius: 12px; padding: 12px 15px; border: 1px solid #222; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center; }
    .chart-box { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #222; margin-top: 8px; }
    .chart-title { font-size: 10px; font-weight: bold; color: var(--gray); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px;}
    .hit-bar { width: 100%; background: #222; border-radius: 2px; height: 75px; position: relative; overflow: hidden;}
    .hit-fill { position: absolute; bottom: 0; left: 0; right: 0; }
    .hits-chart { display: grid; gap: 4px; text-align: center; margin-top: 5px; height: 110px; align-items: end; }
    .hit-label { font-size: 8px; font-weight: 900; margin-top: 4px; }
    .hit-count { font-size: 9px; margin-bottom: 4px; color: var(--text); font-weight: bold; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
    #face-container, .history-face-container { width: 100%; aspect-ratio: 1; position: relative; margin: 10px 0; touch-action: none; overflow: hidden; border-radius: 10px; background: #0a0a0a; border: 1px solid #222;}
    #magnifier { position: absolute; width: 120px; height: 120px; border-radius: 50%; border: 3px solid #fff; display: none; pointer-events: none; overflow: hidden; background: #000; z-index: 20; transform: translate(-50%, -130%); box-shadow: 0 0 20px rgba(0,0,0,0.8); }
    #magnifier svg { position: absolute; width: 500%; height: 500%; }
    #crosshair { position: absolute; width: 14px; height: 14px; border: 1px solid #fff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 21; }
    #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 2px; height: 2px; background: red; border-radius: 50%; transform: translate(-50%, -50%); }
    #float-score { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); font-weight: 900; font-size: 24px; color: #fff; text-shadow: 0 0 8px #000; }

    /* --- NEW MULTI-PARTICIPANT STYLES --- */
    .participant-choice { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
    .count-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); background: none; color: #fff; font-size: 18px; font-weight: 900; }
    .count-btn.active { background: var(--accent); color: #000; }
    .name-input-list { display: flex; flex-direction: column; gap: 10px; width: 80%; }
    .archer-tabs { display: none; gap: 5px; padding: 10px 20px; background: #000; overflow-x: auto; border-bottom: 1px solid #222; }
    .archer-tab { padding: 8px 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px 10px 0 0; color: var(--gray); font-size: 11px; font-weight: 800; white-space: nowrap; transition: 0.2s; }
    .archer-tab.active { background: var(--card); border-color: var(--accent); color: var(--accent); border-bottom-color: var(--card); }
    .group-indicator { font-size: 10px; color: var(--accent); margin-left: 5px; font-weight: 900; }
</style>
