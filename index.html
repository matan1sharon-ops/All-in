<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ALL IN Archery</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #FFD700; --card: #151515; --gray: #888; --edit: #007aff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; touch-action: manipulation; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; position: relative; }
        .screen { display: none; flex-direction: column; height: 100%; padding: 40px 20px 20px; position: absolute; top: 0; left: 0; width: 100%; background: var(--bg); }
        .active-screen { display: flex; z-index: 10; }
        
        .logo-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .logo-svg { width: 80px; height: 80px; margin-bottom: 10px; }
        .logo-text { font-size: 32px; font-weight: 900; letter-spacing: 6px; text-align: center; }
        .menu-list { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; overflow-y: auto; }
        .menu-btn { background: #fff; color: #000; padding: 18px; border-radius: 15px; font-size: 16px; font-weight: 800; border: none; text-align: left; cursor: pointer; }
        .vault-btn { background: var(--card); border: 1px solid #333; color: #fff; padding: 16px; border-radius: 15px; font-weight: bold; text-align: center; cursor: pointer; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #222; }
        #mode-title { font-size: 24px; font-weight: 900; letter-spacing: 1px; color: #fff; flex-grow: 1; text-align: center; margin: 0 10px; }
        
        #score-list { flex-grow: 1; overflow-y: auto; padding: 15px 0; display: flex; flex-direction: column; gap: 10px; }
        .end-card { background: var(--card); padding: 10px 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; min-height: 60px; }
        .active-card { border: 2px solid var(--accent); background: #111; }
        .editing-card { border: 2px solid var(--edit); background: #001a33; }
        
        /* Reduced End Numbers to 18px */
        .end-val { font-size: 18px; font-weight: 700; letter-spacing: 1px; color: #fff; }
        .end-total { font-weight: 900; font-size: 20px; }
        .end-meta { font-size: 10px; color: var(--gray); text-transform: uppercase; font-weight: bold; margin-bottom: 2px; }
        
        .controls { background: var(--bg); padding-top: 10px; padding-bottom: env(safe-area-inset-bottom, 20px); border-top: 1px solid #222; }
        .crawl-box { background: var(--card); padding: 10px 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .crawl-btn { background: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 20px; font-weight: bold; }
        .next-btn { background: var(--accent); color: #000; width: 100%; padding: 18px; border-radius: 12px; font-size: 20px; font-weight: 900; border: none; margin-bottom: 15px; }
        
        .btn-grid { display: grid; gap: 8px; }
        .score-btn { height: 60px; border-radius: 10px; border: 1px solid #333; font-size: 22px; font-weight: 900; cursor: pointer; }
        
        .chart-container { width: 100%; height: 200px; margin-top: 15px; margin-bottom: 15px; background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid #222; }
        .vault-input { background: #1c1c1e; border: 1px solid #3a3a3c; color: #fff; padding: 16px; border-radius: 12px; width: 100%; font-size: 16px; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="app-container">
    <div id="home" class="screen active-screen">
        <div class="logo-container">
            <svg class="logo-svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#151515"/><circle cx="50" cy="50" r="35" fill="#FFD700"/><circle cx="50" cy="50" r="20" fill="#151515"/><circle cx="50" cy="50" r="8" fill="#FFD700"/></svg>
            <div class="logo-text">ALL IN</div>
        </div>
        <div class="menu-list">
            <button class="menu-btn" onclick="startApp('3D', 2, 24)">3D Practice (24)</button>
            <button class="menu-btn" onclick="startApp('FIELD', 3, 24)">Field Practice (24)</button>
            <button class="menu-btn" onclick="startApp('TARGET INDOOR', 3, 20)">Target Indoor (20)</button>
            <button class="menu-btn" onclick="startApp('TARGET OUTDOOR', 6, 12)">Target Outdoor (12)</button>
            <button class="vault-btn" onclick="openJournal()">📖 SESSION JOURNAL</button>
            <button class="vault-btn" onclick="showScreen('vault')">⚙ GEAR VAULT</button>
        </div>
    </div>

    <div id="journal" class="screen">
        <header><button onclick="showScreen('home')" style="background:none; border:none; color:var(--gray); font-size:18px">← Back</button><div style="font-weight:900">JOURNAL</div><button onclick="clearJournal()" style="background:none; border:none; color:red; font-size:12px; font-weight:bold;">CLEAR</button></header>
        <div class="chart-container"><canvas id="progressChart"></canvas></div>
        <div id="journal-list" style="flex-grow:1; overflow-y:auto;"></div>
    </div>

    <div id="vault" class="screen">
        <header><button onclick="showScreen('home')" style="background:none; border:none; color:var(--gray); font-size:18px">← Back</button><div style="font-weight:900">VAULT</div><button onclick="saveVault()" style="background:none; border:none; color:var(--accent); font-size:14px; font-weight:bold;">SAVE</button></header>
        <div style="padding-top:20px; overflow-y:auto;"><input id="in-name" class="vault-input" placeholder="Archer Name"><input id="in-bow" class="vault-input" placeholder="Bow Make"><input id="in-arrow-make" class="vault-input" placeholder="Arrow Make"><input id="in-spine" type="number" class="vault-input" placeholder="Arrow Spine"></div>
    </div>

    <div id="scoring" class="screen">
        <header>
            <button onclick="if(confirm('Exit?')) showScreen('home')" style="background:none; border:none; color:var(--gray); font-size:28px">✕</button>
            <div id="mode-title">DISCIPLINE</div>
            <div style="text-align:right">
                <div id="target-count" style="background:var(--accent); color:#000; padding:4px 10px; border-radius:8px; font-weight:bold; font-size:14px">T1</div>
                <div id="total-score" style="font-size:20px; font-weight:900; margin-top:4px">0</div>
            </div>
        </header>
        <div id="score-list"></div>
        <div class="controls">
            <div id="crawl-ui" class="crawl-box"><span>CRAWL</span><div style="display:flex; align-items:center; gap:15px;"><button class="crawl-btn" onclick="adjCrawl(-1)">-</button><span id="crawl-val" style="color:var(--accent); font-weight:900; font-size:18px;">0</span><button class="crawl-btn" onclick="adjCrawl(1)">+</button></div></div>
            <button id="main-action-btn" class="next-btn" onclick="nextEnd()">NEXT END</button>
            <div id="button-area" class="btn-grid"></div>
        </div>
    </div>
</div>

<script>
    let state = { current: [], history: [], arrowLimit: 2,
