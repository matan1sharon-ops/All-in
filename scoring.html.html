<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="apple-touch-icon" href="scoring-icon-180.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --bg: #111; --surface: #1e1e1e; --surface2: #2a2a2a; --border: #383838;
    --accent: #FFD700; --red: #e53935; --blue: #1e88e5; --green: #43a047;
    --text: #f0f0f0; --muted: #888; --tab-active: #2196f3; --radius: 10px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Barlow', sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100dvh; overflow: hidden; padding-top: env(safe-area-inset-top); }

  .screen { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 20px; opacity: 1; transition: opacity 0.2s ease; z-index: 10; }
  .screen.hidden { opacity: 0; pointer-events: none; }

  .setup-card { background: var(--surface); padding: 24px 20px; border-radius: 16px; width: 100%; max-width: 360px; border: 1px solid var(--border); }
  .setup-card h2 { margin: 0 0 20px; text-align: center; color: var(--accent); font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; letter-spacing: 2px; }

  .mode-btn { width: 100%; padding: 18px 20px; margin: 8px 0; border-radius: var(--radius); border: none; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 1px; cursor: pointer; color: white; transition: transform 0.1s, filter 0.15s; display: flex; align-items: center; gap: 12px; }
  .mode-btn:active { transform: scale(0.97); filter: brightness(0.9); }
  .out-btn { background: linear-gradient(135deg, #2e7d32, #388e3c); }
  .in-btn  { background: linear-gradient(135deg, #1565c0, #1976d2); }
  .mode-btn .icon { font-size: 22px; } .mode-btn .label { flex: 1; text-align: left; }
  .mode-btn .sub { font-size: 11px; font-weight: 400; opacity: 0.8; font-family: 'Barlow', sans-serif; letter-spacing: 0; }

  .history-link-btn { margin-top: 16px; background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; padding: 12px 28px; border-radius: 30px; cursor: pointer; }
  .history-link-btn:active { color: var(--text); border-color: var(--muted); }

  .input-group { margin-bottom: 12px; }
  .input-group label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-group input { width: 100%; padding: 11px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 15px; outline: none; transition: border-color 0.15s; }
  .input-group input:focus { border-color: var(--tab-active); }

  .back-link { background: none; border: none; color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 14px; cursor: pointer; padding: 8px 0; margin-bottom: 12px; align-self: flex-start; }
  .start-btn { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: var(--radius); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 17px; letter-spacing: 1px; margin-top: 8px; cursor: pointer; transition: transform 0.1s, filter 0.15s; }
  .start-btn:active { transform: scale(0.97); filter: brightness(0.9); }

  /* MAIN APP */
  #main-app { display: none; flex-direction: column; height: calc(100dvh - env(safe-area-inset-top)); width: 100%; position: relative; z-index: 5; }
  #archer-tabs { display: flex; background: var(--surface); padding: 6px; gap: 5px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab-btn { flex: 1; min-width: 0; padding: 9px 4px; border: none; border-radius: 6px; background: transparent; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .tab-btn.active { background: var(--tab-active); color: #fff; }
  .settings-btn { width: 36px; flex-shrink: 0; background: transparent; color: var(--muted); border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }

  #table-container { flex: 1; overflow-y: auto; overflow-x: hidden; background: #fff; color: #111; }

  .half-header { display: grid; grid-template-columns: 1fr 36px 36px; background: #444; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-align: center; padding: 3px 0; }
  .half-header .half-title { text-align: left; padding-left: 10px; }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 13px; border: 1.5px solid #999; margin-bottom: 0; }
  th, td { border: 1px solid #ccc; text-align: center; height: 32px; padding: 0; position: relative; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; }
  .col-end { width: 46px; } .col-arr { width: auto; } .col-sum { width: 36px; } .col-tot { width: 38px; } .col-run { width: 46px; } .col-stat { width: 32px; }

  .end-label       { background: #f0f0f0; font-weight: 700; font-size: 10px; color: #333; border-right: 1.5px solid #999; }
  .sum-box         { background: #f5f5f5; border-left: 1px solid #bbb; color: #555; font-size: 12px; }
  .end-total-box   { background: #e3f2fd; font-weight: 700; border-left: 1.5px solid #999; color: #1565c0; }
  .running-sum-box { background: #fff8e1; font-weight: 700; color: #c62828; border-left: 1.5px solid #999; border-right: 1.5px solid #999; font-size: 13px; }
  .stat-box        { font-size: 11px; color: #555; background: #fafafa; }
  .gold-hit        { background-color: #fff9c4 !important; color: #5d4037 !important; font-weight: 700; }
  .active-cell     { background-color: #fff3e0 !important; outline: 2.5px solid #FF9800; outline-offset: -2px; z-index: 10; }
  .editing-cell    { background-color: #e3f2fd !important; outline: 2.5px solid #2196f3; outline-offset: -2px; z-index: 11; }
  .no-entry        { background-image: repeating-linear-gradient(135deg, transparent, transparent 4px, #e0e0e0 4px, #e0e0e0 5px); }
  .end-sep td      { border-bottom: 1.5px solid #999 !important; }
  .half-total-row  { background: #37474f !important; color: #fff !important; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; height: 30px; }
  .half-total-row td { border-color: #546e7a; color: #fff; }

  #session-footer { background: #b71c1c; color: #fff; display: flex; align-items: center; padding: 0 8px; height: 42px; border-top: 2px solid #7f0000; flex-shrink: 0; gap: 4px; }
  .foot-label { flex: 1; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .foot-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; width: 42px; text-align: center; background: rgba(0,0,0,0.2); border-radius: 4px; padding: 2px 0; }

  #pad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 8px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .pad-btn { padding: 0; height: 52px; font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; border-radius: 8px; border: none; cursor: pointer; box-shadow: 0 3px 0 rgba(0,0,0,0.35); transition: transform 0.08s, box-shadow 0.08s, filter 0.1s; letter-spacing: 0.5px; }
  .pad-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.35); filter: brightness(0.92); }
  .gold { background: #FFD700; color: #3e2000; } .red { background: #e53935; color: white; } .blue { background: #1e88e5; color: white; }
  .black { background: #2d2d2d; color: white; border: 1px solid #555; } .white { background: #f5f5f5; color: #111; border: 1px solid #ccc; } .miss { background: #757575; color: white; }
  .backspace-btn { grid-column: span 4; background: #333; color: #aaa; font-size: 16px; height: 44px; }
  .save-hist-btn { grid-column: span 2; background: #1b5e20; color: #a5d6a7; font-size: 13px; height: 40px; }
  .pdf-btn       { grid-column: span 2; background: #4a148c; color: #ce93d8; font-size: 13px; height: 40px; }

  /* NEXT ARCHER BANNER */
  #next-archer-banner { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; flex-direction: column; }
  #next-archer-banner.show { display: flex; }
  .banner-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 32px; text-align: center; max-width: 300px; width: 90%; }
  .banner-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .banner-name  { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 900; color: var(--accent); letter-spacing: 1px; margin-bottom: 4px; }
  .banner-sub   { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .banner-btn   { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: var(--radius); font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; cursor: pointer; }

  /* HISTORY SCREEN */
  #history-screen { position: fixed; inset: 0; background: var(--bg); z-index: 50; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; }
  #history-screen.open { transform: translateX(0); }
  .hist-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .hist-header h2 { flex: 1; margin: 0; font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 900; letter-spacing: 2px; color: var(--accent); }
  .hist-back-btn  { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; padding: 4px; }
  .hist-clear-btn { background: none; border: none; color: var(--red); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; padding: 6px 10px; }

  #history-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 7px; }
  .hist-empty { text-align: center; color: var(--muted); font-size: 15px; margin-top: 60px; line-height: 1.8; }

  /* Compact one-row history card */
  .hist-card { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 9px 12px; cursor: pointer; display: flex; flex-wrap: wrap; align-items: center; gap: 5px; }
  .hist-card:active { background: var(--surface2); }
  .hist-card-meta { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .hist-card-date { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .hist-card-sep  { color: var(--border); font-size: 11px; flex-shrink: 0; }
  .hist-card-archers { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; min-width: 0; }
  .hist-archer-pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 2px 9px; font-size: 12px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; white-space: nowrap; }
  .hist-archer-pill span { color: var(--accent); margin-left: 4px; }
  .hist-delete-btn { background: none; border: none; color: #555; font-size: 16px; cursor: pointer; padding: 2px 4px; flex-shrink: 0; margin-left: 2px; }
  .hist-delete-btn:active { color: var(--red); }

  /* DETAIL SCREEN */
  #detail-screen { position: fixed; inset: 0; background: var(--bg); z-index: 60; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; }
  #detail-screen.open { transform: translateX(0); }
  #detail-content { flex: 1; overflow-y: auto; background: #fff; color: #111; }
  .detail-summary { background: #37474f; color: #fff; padding: 14px 16px; display: flex; gap: 16px; align-items: center; font-family: 'Barlow Condensed', sans-serif; flex-shrink: 0; }
  .detail-summary-score { font-size: 42px; font-weight: 900; color: var(--accent); line-height: 1; }
  .detail-summary-info  { flex: 1; }
  .detail-summary-name  { font-size: 18px; font-weight: 700; }
  .detail-summary-sub   { font-size: 12px; color: #aaa; margin-top: 2px; }
  .detail-archer-tabs { display: flex; background: #455a64; overflow-x: auto; flex-shrink: 0; }
  .detail-archer-tab  { padding: 10px 16px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; color: #aaa; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
  .detail-archer-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .detail-pdf-btn { background: none; border: none; color: #ce93d8; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; padding: 6px 10px; letter-spacing: 0.5px; }
</style>
</head>
<body>

<!-- MODE SCREEN -->
<div id="mode-screen" class="screen">
  <div class="setup-card">
    <h2>🏹 SELECT MODE</h2>
    <button class="mode-btn out-btn" onclick="selectMode('outdoor')">
      <span class="icon">☀️</span>
      <span class="label">OUTDOOR<br><span class="sub">72 arrows · 12 ends · 6 per end</span></span>
    </button>
    <button class="mode-btn in-btn" onclick="selectMode('indoor')">
      <span class="icon">🏛️</span>
      <span class="label">INDOOR<br><span class="sub">60 arrows · 20 ends · 3 per end</span></span>
    </button>
  </div>
  <button class="history-link-btn" onclick="openHistory()">📜 SESSION HISTORY</button>
</div>

<!-- SETUP SCREEN -->
<div id="setup-screen" class="screen hidden">
  <div class="setup-card">
    <button class="back-link" onclick="goBack()">← Back</button>
    <h2>ARCHER SETUP</h2>
    <div class="input-group"><label>Archer 1 Name</label><input type="text" id="name-0" value="Archer 1" autocomplete="off"></div>
    <div class="input-group"><label>Archer 2 <span style="color:#555">(optional)</span></label><input type="text" id="name-1" placeholder="Leave blank to skip" autocomplete="off"></div>
    <div class="input-group"><label>Archer 3 <span style="color:#555">(optional)</span></label><input type="text" id="name-2" placeholder="Leave blank to skip" autocomplete="off"></div>
    <div class="input-group"><label>Archer 4 <span style="color:#555">(optional)</span></label><input type="text" id="name-3" placeholder="Leave blank to skip" autocomplete="off"></div>
    <button class="start-btn" onclick="startSession()">START SESSION →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app">
  <div id="archer-tabs"></div>
  <div id="table-container">
    <div class="half-header">
      <div class="half-title" id="h1-main-title">1st HALF</div>
      <div id="h1-s1"></div><div id="h1-s2"></div>
    </div>
    <table><colgroup id="col-group-1"></colgroup><tbody id="body-1"></tbody></table>
    <div class="half-header" style="margin-top:8px;">
      <div class="half-title" id="h2-main-title">2nd HALF</div>
      <div id="h2-s1"></div><div id="h2-s2"></div>
    </div>
    <table><colgroup id="col-group-2"></colgroup><tbody id="body-2"></tbody></table>
    <div style="height:12px;"></div>
  </div>
  <div id="session-footer">
    <div class="foot-label" id="footer-name">TOTAL:</div>
    <div class="foot-val" id="gt-score">0</div>
    <div class="foot-val" id="gt-stat1">0</div>
    <div class="foot-val" id="gt-stat2">0</div>
  </div>
  <div id="pad">
    <button id="btn-x"  class="pad-btn gold"         onclick="handleInput('X')">X</button>
    <button             class="pad-btn gold"         onclick="handleInput(10)">10</button>
    <button             class="pad-btn gold"         onclick="handleInput(9)">9</button>
    <button             class="pad-btn red"          onclick="handleInput(8)">8</button>
    <button             class="pad-btn red"          onclick="handleInput(7)">7</button>
    <button             class="pad-btn blue"         onclick="handleInput(6)">6</button>
    <button             class="pad-btn blue"         onclick="handleInput(5)">5</button>
    <button             class="pad-btn black"        onclick="handleInput(4)">4</button>
    <button             class="pad-btn black"        onclick="handleInput(3)">3</button>
    <button             class="pad-btn white"        onclick="handleInput(2)">2</button>
    <button             class="pad-btn white"        onclick="handleInput(1)">1</button>
    <button             class="pad-btn miss"         onclick="handleInput('M')">M</button>
    <button             class="pad-btn backspace-btn" onclick="backspace()">BACKSPACE ←</button>
    <button             class="pad-btn save-hist-btn" onclick="saveToHistory()">💾 SAVE TO HISTORY</button>
    <button             class="pad-btn pdf-btn"       onclick="exportPDF(null)">📄 EXPORT PDF</button>
  </div>
</div>

<!-- NEXT ARCHER BANNER -->
<div id="next-archer-banner">
  <div class="banner-card">
    <div class="banner-title">End complete — next up</div>
    <div class="banner-name" id="banner-name">—</div>
    <div class="banner-sub"  id="banner-sub"></div>
    <button class="banner-btn" onclick="dismissBanner()">READY →</button>
  </div>
</div>

<!-- HISTORY SCREEN -->
<div id="history-screen">
  <div class="hist-header">
    <button class="hist-back-btn" onclick="closeHistory()">←</button>
    <h2>HISTORY</h2>
    <button class="hist-clear-btn" onclick="clearAllHistory()">CLEAR ALL</button>
  </div>
  <div id="history-list"></div>
</div>

<!-- DETAIL SCREEN -->
<div id="detail-screen">
  <div class="hist-header">
    <button class="hist-back-btn" onclick="closeDetail()">←</button>
    <h2 id="detail-title">SESSION</h2>
    <button class="detail-pdf-btn" onclick="exportPDF(detailEntry)">📄 PDF</button>
  </div>
  <div class="detail-archer-tabs" id="detail-archer-tabs"></div>
  <div class="detail-summary"     id="detail-summary"></div>
  <div id="detail-content"></div>
</div>

<script>
/* ── STATE ── */
let archers = [], currentIdx = 0, editIndex = null, sessionMode = 'outdoor';
let pendingNextIdx = -1;
let detailEntry = null, detailArcherIdx = 0;

const SAVE_KEY    = 'archery_session';
const HISTORY_KEY = 'archery_history';

/* ── PERSISTENCE ── */
function saveSession() {
  localStorage.setItem(SAVE_KEY, JSON.stringify({ archers, currentIdx, sessionMode }));
}
function clearSave() { localStorage.removeItem(SAVE_KEY); }

/* ── HISTORY STORAGE ── */
function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e) { return []; }
}
function setHistory(h) { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }

function calcStats(scores, mode) {
  const total = scores.reduce((s, v) => s + (v==='X'||v===10?10:v==='M'?0:Number(v)||0), 0);
  return {
    total,
    filled: scores.filter(s => s !== '').length,
    tens:   scores.filter(s => s===10||s==='X').length,
    xs:     scores.filter(s => s==='X').length,
    nines:  scores.filter(s => s===9).length
  };
}

function saveToHistory() {
  const filled = archers[0].scores.filter(s => s !== '').length;
  if (filled === 0) { alert('No scores to save yet!'); return; }
  if (!confirm(`Save this session to history?\n(${filled} of ${sessionMode==='outdoor'?72:60} arrows)`)) return;
  _doSaveHistory();
  alert('Saved! ✓');
}

function autoSaveToHistory() {
  _doSaveHistory();
  clearSave();
  alert('Session complete! ✓ Saved to history automatically.');
  // return to mode screen
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('mode-screen').classList.remove('hidden');
  archers = []; currentIdx = 0; editIndex = null;
}

function _doSaveHistory() {
  const now = new Date();
  const entry = {
    id:      Date.now(),
    date:    now.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }),
    time:    now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' }),
    mode:    sessionMode,
    archers: archers.map(a => ({ name: a.name, scores: [...a.scores], stats: calcStats(a.scores, sessionMode) }))
  };
  const history = getHistory();
  history.unshift(entry);
  setHistory(history);
}

/* ── HISTORY SCREEN ── */
function openHistory() { renderHistoryList(); document.getElementById('history-screen').classList.add('open'); }
function closeHistory() { document.getElementById('history-screen').classList.remove('open'); }
function clearAllHistory() {
  if (!confirm('Delete all saved sessions?')) return;
  setHistory([]); renderHistoryList();
}

function renderHistoryList() {
  const history = getHistory();
  const list    = document.getElementById('history-list');
  if (history.length === 0) {
    list.innerHTML = `<div class="hist-empty">🏹<br>No saved sessions yet.<br>Tap <strong>SAVE TO HISTORY</strong> during a session.</div>`;
    return;
  }
  list.innerHTML = history.map(e => {
    const isOut = e.mode === 'outdoor';
    const modeLabel = isOut ? '☀️ OUT' : '🏛️ IN';
    const pills = e.archers.map(a =>
      `<div class="hist-archer-pill">${a.name}<span>${a.stats.total}</span></div>`
    ).join('');
    return `
      <div class="hist-card" onclick="openDetail(${e.id})">
        <span class="hist-card-meta">${modeLabel}</span>
        <span class="hist-card-sep">·</span>
        <span class="hist-card-date">${e.date}</span>
        <span class="hist-card-sep">·</span>
        <div class="hist-card-archers">${pills}</div>
        <button class="hist-delete-btn" onclick="deleteEntry(event,${e.id})">🗑</button>
      </div>`;
  }).join('');
}

function deleteEntry(e, id) {
  e.stopPropagation();
  if (!confirm('Delete this session?')) return;
  setHistory(getHistory().filter(h => h.id !== id));
  renderHistoryList();
}

/* ── DETAIL SCREEN ── */
function openDetail(id) {
  detailEntry     = getHistory().find(h => h.id === id);
  detailArcherIdx = 0;
  if (!detailEntry) return;
  document.getElementById('detail-title').innerText = detailEntry.mode === 'outdoor' ? 'OUTDOOR' : 'INDOOR';
  renderDetailTabs();
  renderDetailContent();
  document.getElementById('detail-screen').classList.add('open');
}
function closeDetail() { document.getElementById('detail-screen').classList.remove('open'); }

function renderDetailTabs() {
  const tabs = document.getElementById('detail-archer-tabs');
  if (detailEntry.archers.length <= 1) { tabs.innerHTML = ''; return; }
  tabs.innerHTML = detailEntry.archers.map((a, i) =>
    `<button class="detail-archer-tab ${i===detailArcherIdx?'active':''}" onclick="switchDetailArcher(${i})">${a.name.toUpperCase()}</button>`
  ).join('');
}
function switchDetailArcher(idx) { detailArcherIdx = idx; renderDetailTabs(); renderDetailContent(); }

function renderDetailContent() {
  const entry  = detailEntry;
  const archer = entry.archers[detailArcherIdx];
  const stats  = archer.stats;
  const isOut  = entry.mode === 'outdoor';
  const s1Lab  = isOut ? '10+X' : '10s';
  const s2Lab  = isOut ? 'X'    : '9s';
  const s2Val  = isOut ? stats.xs : stats.nines;

  document.getElementById('detail-summary').innerHTML = `
    <div class="detail-summary-score">${stats.total}</div>
    <div class="detail-summary-info">
      <div class="detail-summary-name">${archer.name.toUpperCase()}</div>
      <div class="detail-summary-sub">${entry.date} · ${entry.time} · ${stats.filled} arrows</div>
      <div class="detail-summary-sub" style="margin-top:4px;">${s1Lab}: <strong style="color:var(--accent)">${stats.tens}</strong> &nbsp; ${s2Lab}: <strong style="color:var(--accent)">${s2Val}</strong></div>
    </div>`;

  const outCols = '<col class="col-end"><col class="col-arr"><col class="col-arr"><col class="col-arr"><col class="col-sum"><col class="col-tot"><col class="col-run"><col class="col-stat"><col class="col-stat">';
  const inCols  = '<col class="col-end"><col class="col-arr"><col class="col-arr"><col class="col-arr"><col class="col-tot"><col class="col-run"><col class="col-stat"><col class="col-stat">';
  const cols    = isOut ? outCols : inCols;
  const sH1 = isOut ? '10+X' : '10';
  const sH2 = isOut ? 'X'    : '9';
  const h1L = isOut ? '1st HALF  (Ends 1–6)'  : '1st HALF  (Ends 1–10)';
  const h2L = isOut ? '2nd HALF  (Ends 7–12)' : '2nd HALF  (Ends 11–20)';

  document.getElementById('detail-content').innerHTML = `
    <div class="half-header"><div class="half-title">${h1L}</div><div>${sH1}</div><div>${sH2}</div></div>
    <table><colgroup>${cols}</colgroup><tbody id="d-body-1"></tbody></table>
    <div class="half-header" style="margin-top:8px;"><div class="half-title">${h2L}</div><div>${sH1}</div><div>${sH2}</div></div>
    <table><colgroup>${cols}</colgroup><tbody id="d-body-2"></tbody></table>
    <div style="height:16px;"></div>`;

  if (isOut) { renderROOutdoor(archer.scores,0,6,'d-body-1'); renderROOutdoor(archer.scores,6,12,'d-body-2'); }
  else        { renderROIndoor(archer.scores,0,10,'d-body-1'); renderROIndoor(archer.scores,10,20,'d-body-2'); }
}

function roCellHtml(val) {
  const cls = (val==='X'||val===10||val===9) ? 'gold-hit' : '';
  return `<td class="${cls}">${val}</td>`;
}

function renderROOutdoor(scores, startEnd, endEnd, bodyId) {
  let html='', running=0, tens=0, xs=0;
  for (let e=startEnd+1; e<=endEnd; e++) {
    const sIdx=(e-1)*6, a=scores.slice(sIdx,sIdx+6);
    const v=a.map(x=>x==='X'||x===10?10:x==='M'?0:Number(x)||0);
    const s1=(a[0]!==''&&a[1]!==''&&a[2]!=='')?v[0]+v[1]+v[2]:'';
    const s2=(a[3]!==''&&a[4]!==''&&a[5]!=='')?v[3]+v[4]+v[5]:'';
    const et=s2!==''?(Number(s1)||0)+s2:'';
    if(et!=='') running+=et;
    const c10=a.filter(x=>x===10||x==='X').length, cx=a.filter(x=>x==='X').length;
    if(a[0]!==''){tens+=c10;xs+=cx;}
    html+=`<tr><td rowspan="2" class="end-label">End ${e}</td>${roCellHtml(a[0])}${roCellHtml(a[1])}${roCellHtml(a[2])}<td class="sum-box">${s1}</td><td class="no-entry"></td><td rowspan="2" class="running-sum-box">${et!==''?running:''}</td><td class="stat-box">${a[0]!==''?c10:''}</td><td class="stat-box">${a[0]!==''?cx:''}</td></tr><tr class="end-sep">${roCellHtml(a[3])}${roCellHtml(a[4])}${roCellHtml(a[5])}<td class="sum-box">${s2}</td><td class="end-total-box">${et}</td><td class="stat-box"></td><td class="stat-box"></td></tr>`;
  }
  html+=`<tr class="half-total-row"><td colspan="5">HALF TOTAL</td><td>${running}</td><td></td><td>${tens}</td><td>${xs}</td></tr>`;
  document.getElementById(bodyId).innerHTML=html;
}

function renderROIndoor(scores, startEnd, endEnd, bodyId) {
  let html='', running=0, tens=0, nines=0;
  for (let e=startEnd+1; e<=endEnd; e++) {
    const sIdx=(e-1)*3, a=scores.slice(sIdx,sIdx+3);
    const v=a.map(x=>x==='X'||x===10?10:x==='M'?0:Number(x)||0);
    const et=(a[0]!==''&&a[1]!==''&&a[2]!=='')?v[0]+v[1]+v[2]:'';
    if(et!=='') running+=et;
    const c10=a.filter(x=>x===10||x==='X').length, c9=a.filter(x=>x===9).length;
    if(a[0]!==''){tens+=c10;nines+=c9;}
    html+=`<tr class="end-sep"><td class="end-label">End ${e}</td>${roCellHtml(a[0])}${roCellHtml(a[1])}${roCellHtml(a[2])}<td class="end-total-box">${et}</td><td class="running-sum-box">${et!==''?running:''}</td><td class="stat-box">${a[0]!==''?c10:''}</td><td class="stat-box">${a[0]!==''?c9:''}</td></tr>`;
  }
  html+=`<tr class="half-total-row"><td colspan="4">HALF TOTAL</td><td>${running}</td><td></td><td>${tens}</td><td>${nines}</td></tr>`;
  document.getElementById(bodyId).innerHTML=html;
}

/* ── PDF EXPORT ── */
// entry = history entry object, or null to export current live session
function exportPDF(entry) {
  const isLive  = !entry;
  const mode    = isLive ? sessionMode : entry.mode;
  const isOut   = mode === 'outdoor';
  const s1Lab   = isOut ? '10+X' : '10';
  const s2Lab   = isOut ? 'X'    : '9';
  const archerList = isLive
    ? archers.map(a => ({ name: a.name, scores: a.scores, stats: calcStats(a.scores, mode) }))
    : entry.archers;
  const dateStr = isLive
    ? new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
    : entry.date;
  const timeStr = isLive
    ? new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' })
    : entry.time;

  function cellStyle(val) {
    return (val==='X'||val===10||val===9) ? 'background:#fff9c4;' : '';
  }

  function buildTable(archer) {
    const scores = archer.scores;
    let rows = '';
    if (isOut) {
      let running=0, tens=0, xs=0;
      for (let e=1; e<=12; e++) {
        const sIdx=(e-1)*6, a=scores.slice(sIdx,sIdx+6);
        const v=a.map(x=>x==='X'||x===10?10:x==='M'?0:Number(x)||0);
        const s1=(a[0]!==''&&a[1]!==''&&a[2]!=='')?v[0]+v[1]+v[2]:'';
        const s2=(a[3]!==''&&a[4]!==''&&a[5]!=='')?v[3]+v[4]+v[5]:'';
        const et=s2!==''?(Number(s1)||0)+s2:'';
        if(et!=='') running+=et;
        const c10=a.filter(x=>x===10||x==='X').length, cx=a.filter(x=>x==='X').length;
        if(a[0]!==''){tens+=c10;xs+=cx;}
        const sepStyle = e===6 ? 'border-bottom:2px solid #555;' : '';
        rows += `<tr style="${sepStyle}">
          <td rowspan="2" style="background:#f0f0f0;font-weight:700;font-size:10px;border-right:2px solid #999;">End ${e}</td>
          <td style="${cellStyle(a[0])}">${a[0]}</td><td style="${cellStyle(a[1])}">${a[1]}</td><td style="${cellStyle(a[2])}">${a[2]}</td>
          <td style="background:#f5f5f5;font-size:11px;">${s1}</td>
          <td style="background:#eee;"></td>
          <td rowspan="2" style="background:#fff8e1;font-weight:700;color:#c62828;border-left:2px solid #999;border-right:2px solid #999;">${et!==''?running:''}</td>
          <td style="font-size:11px;color:#555;">${a[0]!==''?c10:''}</td>
          <td style="font-size:11px;color:#555;">${a[0]!==''?cx:''}</td>
        </tr><tr style="border-bottom:1.5px solid #aaa;">
          <td style="${cellStyle(a[3])}">${a[3]}</td><td style="${cellStyle(a[4])}">${a[4]}</td><td style="${cellStyle(a[5])}">${a[5]}</td>
          <td style="background:#f5f5f5;font-size:11px;">${s2}</td>
          <td style="background:#e3f2fd;font-weight:700;color:#1565c0;border-left:2px solid #999;">${et}</td>
          <td></td><td></td>
        </tr>`;
      }
      rows += `<tr style="background:#37474f;color:#fff;font-weight:700;">
        <td colspan="5">TOTAL</td><td>${running}</td><td></td><td>${tens}</td><td>${xs}</td></tr>`;
      return `<table style="width:100%;border-collapse:collapse;table-layout:fixed;border:1.5px solid #999;font-size:12px;">
        <colgroup><col style="width:46px"><col><col><col><col style="width:32px"><col style="width:34px"><col style="width:44px"><col style="width:28px"><col style="width:28px"></colgroup>
        <tr style="background:#555;color:#fff;font-size:10px;font-weight:700;">
          <th colspan="4" style="text-align:left;padding:3px 6px;">ARROWS</th><th>SUB</th><th>END</th><th>TOTAL</th><th>${s1Lab}</th><th>${s2Lab}</th>
        </tr>${rows}</table>`;
    } else {
      let running=0, tens=0, nines=0;
      for (let e=1; e<=20; e++) {
        const sIdx=(e-1)*3, a=scores.slice(sIdx,sIdx+3);
        const v=a.map(x=>x==='X'||x===10?10:x==='M'?0:Number(x)||0);
        const et=(a[0]!==''&&a[1]!==''&&a[2]!=='')?v[0]+v[1]+v[2]:'';
        if(et!=='') running+=et;
        const c10=a.filter(x=>x===10||x==='X').length, c9=a.filter(x=>x===9).length;
        if(a[0]!==''){tens+=c10;nines+=c9;}
        const sepStyle = e===10 ? 'border-bottom:2px solid #555;' : 'border-bottom:1px solid #ccc;';
        rows += `<tr style="${sepStyle}">
          <td style="background:#f0f0f0;font-weight:700;font-size:10px;border-right:2px solid #999;">End ${e}</td>
          <td style="${cellStyle(a[0])}">${a[0]}</td><td style="${cellStyle(a[1])}">${a[1]}</td><td style="${cellStyle(a[2])}">${a[2]}</td>
          <td style="background:#e3f2fd;font-weight:700;color:#1565c0;border-left:2px solid #999;">${et}</td>
          <td style="background:#fff8e1;font-weight:700;color:#c62828;border-left:2px solid #999;border-right:2px solid #999;">${et!==''?running:''}</td>
          <td style="font-size:11px;color:#555;">${a[0]!==''?c10:''}</td>
          <td style="font-size:11px;color:#555;">${a[0]!==''?c9:''}</td>
        </tr>`;
      }
      rows += `<tr style="background:#37474f;color:#fff;font-weight:700;">
        <td colspan="4">TOTAL</td><td>${running}</td><td></td><td>${tens}</td><td>${nines}</td></tr>`;
      return `<table style="width:100%;border-collapse:collapse;table-layout:fixed;border:1.5px solid #999;font-size:12px;">
        <colgroup><col style="width:46px"><col><col><col><col style="width:38px"><col style="width:46px"><col style="width:28px"><col style="width:28px"></colgroup>
        <tr style="background:#555;color:#fff;font-size:10px;font-weight:700;">
          <th colspan="4" style="text-align:left;padding:3px 6px;">ARROWS</th><th>END</th><th>TOTAL</th><th>${s1Lab}</th><th>${s2Lab}</th>
        </tr>${rows}</table>`;
    }
  }

  const sections = archerList.map((a, i) => {
    const stats  = a.stats;
    const s2Val  = isOut ? stats.xs : stats.nines;
    const pageBreak = i < archerList.length-1 ? 'page-break-after:always;' : '';
    return `<div style="${pageBreak}margin-bottom:24px;">
      <div style="background:#37474f;color:#fff;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-family:Arial,sans-serif;">
        <span style="font-size:16px;font-weight:700;">${a.name.toUpperCase()}</span>
        <span style="font-size:24px;font-weight:900;color:#FFD700;">${stats.total}</span>
        <span style="font-size:11px;opacity:0.8;">${s1Lab}: ${stats.tens} &nbsp;|&nbsp; ${s2Lab}: ${s2Val}</span>
      </div>
      ${buildTable(a)}
    </div>`;
  }).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="utf-8">
    <title>Archery Scorecard</title>
    <style>
      body { margin: 16px; font-family: Arial, sans-serif; color: #111; }
      h1 { font-size: 17px; margin: 0 0 2px; }
      .sub { font-size: 11px; color: #666; margin-bottom: 14px; }
      td, th { border: 1px solid #ccc; text-align: center; height: 24px; padding: 0 2px; }
      @media print { body { margin: 8px; } @page { size: A4 portrait; margin: 8mm; } }
    </style>
  </head><body>
    <h1>🏹 Archery Scorecard — ${isOut?'OUTDOOR':'INDOOR'}</h1>
    <div class="sub">${dateStr} · ${timeStr} · ${archerList.length} archer${archerList.length>1?'s':''}</div>
    ${sections}
  </body></html>`;

  const win = window.open('', '_blank');
  if (!win) { alert('Please allow popups to export PDF.'); return; }
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 400);
}

/* ── SESSION FLOW ── */
function selectMode(m) {
  sessionMode = m;
  document.getElementById('btn-x').style.display = m==='indoor' ? 'none' : '';
  showScreen('setup-screen');
}
function goBack() { showScreen('mode-screen'); }
function showScreen(id) {
  ['mode-screen','setup-screen'].forEach(s =>
    document.getElementById(s).classList.toggle('hidden', s!==id));
}

function startSession() {
  archers = [];
  const count = sessionMode==='outdoor' ? 72 : 60;
  for (let i=0; i<4; i++) {
    const n = document.getElementById(`name-${i}`).value.trim();
    if (n!==''||i===0) archers.push({ name: n||`Archer ${i+1}`, scores: Array(count).fill(''), cursor: 0 });
  }
  setupTableCols();
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('main-app').style.display = 'flex';
  switchArcher(0);
}

function setupTableCols() {
  const outCols = '<col class="col-end"><col class="col-arr"><col class="col-arr"><col class="col-arr"><col class="col-sum"><col class="col-tot"><col class="col-run"><col class="col-stat"><col class="col-stat">';
  const inCols  = '<col class="col-end"><col class="col-arr"><col class="col-arr"><col class="col-arr"><col class="col-tot"><col class="col-run"><col class="col-stat"><col class="col-stat">';
  document.getElementById('col-group-1').innerHTML = document.getElementById('col-group-2').innerHTML = sessionMode==='outdoor' ? outCols : inCols;
  const s1 = sessionMode==='outdoor' ? '10+X' : '10';
  const s2 = sessionMode==='outdoor' ? 'X'    : '9';
  document.getElementById('h1-s1').innerText = document.getElementById('h2-s1').innerText = s1;
  document.getElementById('h1-s2').innerText = document.getElementById('h2-s2').innerText = s2;
  document.getElementById('h1-main-title').innerText = sessionMode==='outdoor' ? '1st HALF  (Ends 1–6)'  : '1st HALF  (Ends 1–10)';
  document.getElementById('h2-main-title').innerText = sessionMode==='outdoor' ? '2nd HALF  (Ends 7–12)' : '2nd HALF  (Ends 11–20)';
}

function switchArcher(idx) {
  currentIdx = idx; editIndex = null;
  saveSession(); renderTabs();
  document.getElementById('footer-name').innerText = archers[idx].name.toUpperCase() + '  TOTAL:';
  render();
}

function renderTabs() {
  let tabs = archers.map((a,i) =>
    `<button class="tab-btn ${i===currentIdx?'active':''}" onclick="switchArcher(${i})">${a.name.toUpperCase()}</button>`
  ).join('');
  tabs += `<button class="settings-btn" onclick="confirmReset()" title="New session">⚙</button>`;
  document.getElementById('archer-tabs').innerHTML = tabs;
}

function confirmReset() {
  if (confirm('Start a new session? All current scores will be lost.')) { clearSave(); location.reload(); }
}

function render() {
  const archer = archers[currentIdx]; let h1, h2;
  if (sessionMode==='outdoor') { h1=renderOutdoor(0,6,'body-1',archer); h2=renderOutdoor(6,12,'body-2',archer); }
  else                          { h1=renderIndoor(0,10,'body-1',archer); h2=renderIndoor(10,20,'body-2',archer); }
  document.getElementById('gt-score').innerText = h1.score+h2.score;
  document.getElementById('gt-stat1').innerText = h1.s1+h2.s1;
  document.getElementById('gt-stat2').innerText = h1.s2+h2.s2;
  const target = document.querySelector('.editing-cell')||document.querySelector('.active-cell');
  if (target) target.scrollIntoView({behavior:'smooth',block:'center'});
}

  let html='', running=0, tens=0, xs=0;
  for (let e=startEnd+1; e<=endEnd; e++) {
    const sIdx=(e-1)*6, a=archer.scores.slice(sIdx,sIdx+6);
    const v=a.map(val=>val==='X'||val===10?10:val==='M'?0:Number(val)||0);
    const s1=(a[0]!==''&&a[1]!==''&&a[2]!=='')?v[0]+v[1]+v[2]:'';
    const s2=(a[3]!==''&&a[4]!==''&&a[5]!=='')?v[3]+v[4]+v[5]:'';
    const et=s2!==''?(Number(s1)||0)+s2:'';
    if(et!=='') running+=et;
    const c10=a.filter(x=>x===10||x==='X').length, cx=a.filter(x=>x==='X').length;
    if(a[0]!==''){tens+=c10;xs+=cx;}
    html+=`<tr><td rowspan="2" class="end-label">End ${e}</td>${cellHtml(sIdx,a[0])}${cellHtml(sIdx+1,a[1])}${cellHtml(sIdx+2,a[2])}<td class="sum-box">${s1}</td><td class="no-entry"></td><td rowspan="2" class="running-sum-box">${et!==''?running:''}</td><td class="stat-box">${a[0]!==''?c10:''}</td><td class="stat-box">${a[0]!==''?cx:''}</td></tr><tr class="end-sep">${cellHtml(sIdx+3,a[3])}${cellHtml(sIdx+4,a[4])}${cellHtml(sIdx+5,a[5])}<td class="sum-box">${s2}</td><td class="end-total-box">${et}</td><td class="stat-box"></td><td class="stat-box"></td></tr>`;
  }
  html+=`<tr class="half-total-row"><td colspan="5">HALF TOTAL</td><td>${running}</td><td></td><td>${tens}</td><td>${xs}</td></tr>`;
  document.getElementById(bodyId).innerHTML=html;
  return {score:running,s1:tens,s2:xs};
}

function renderIndoor(startEnd, endEnd, bodyId, archer) {
  let html='', running=0, tens=0, nines=0;
  for (let e=startEnd+1; e<=endEnd; e++) {
    const sIdx=(e-1)*3, a=archer.scores.slice(sIdx,sIdx+3);
    const v=a.map(val=>val==='X'||val===10?10:val==='M'?0:Number(val)||0);
    const et=(a[0]!==''&&a[1]!==''&&a[2]!=='')?v[0]+v[1]+v[2]:'';
    if(et!=='') running+=et;
    const c10=a.filter(x=>x===10||x==='X').length, c9=a.filter(x=>x===9).length;
    if(a[0]!==''){tens+=c10;nines+=c9;}
    html+=`<tr class="end-sep"><td class="end-label">End ${e}</td>${cellHtml(sIdx,a[0])}${cellHtml(sIdx+1,a[1])}${cellHtml(sIdx+2,a[2])}<td class="end-total-box">${et}</td><td class="running-sum-box">${et!==''?running:''}</td><td class="stat-box">${a[0]!==''?c10:''}</td><td class="stat-box">${a[0]!==''?c9:''}</td></tr>`;
  }
  html+=`<tr class="half-total-row"><td colspan="4">HALF TOTAL</td><td>${running}</td><td></td><td>${tens}</td><td>${nines}</td></tr>`;
  document.getElementById(bodyId).innerHTML=html;
  return {score:running,s1:tens,s2:nines};
}

function cellHtml(idx, val) {
  const archer=archers[currentIdx], classes=[];
  if(val==='X'||val===10||val===9) classes.push('gold-hit');
  if(editIndex===idx) classes.push('editing-cell');
  else if(editIndex===null&&archer.cursor===idx) classes.push('active-cell');
  return `<td class="${classes.join(' ')}" onclick="selectCell(${idx})">${val}</td>`;
}

function selectCell(idx) { editIndex=(editIndex===idx)?null:idx; render(); }

function handleInput(val) {
  const archer=archers[currentIdx], step=sessionMode==='outdoor'?6:3;
  if(editIndex!==null){ archer.scores[editIndex]=val; editIndex=null; render(); saveSession(); return; }
  if(archer.cursor>=archer.scores.length) return;
  archer.scores[archer.cursor]=val; archer.cursor++;
  saveSession();
  const totalArrows = sessionMode==='outdoor' ? 72 : 60;
  if(archers.every(a=>a.cursor>=totalArrows)){ render(); autoSaveToHistory(); return; }
  if(archer.cursor%step===0){ render(); if(archers.length>1) showBanner((currentIdx+1)%archers.length); return; }
  render();
}

function showBanner(nextIdx) {
  pendingNextIdx=nextIdx;
  document.getElementById('banner-name').innerText=archers[nextIdx].name.toUpperCase();
  document.getElementById('banner-sub').innerText=`End ${Math.floor(archers[nextIdx].cursor/(sessionMode==='outdoor'?6:3))+1}`;
  document.getElementById('next-archer-banner').classList.add('show');
}
function dismissBanner() {
  document.getElementById('next-archer-banner').classList.remove('show');
  if(pendingNextIdx>=0){ switchArcher(pendingNextIdx); pendingNextIdx=-1; }
}

function backspace() {
  const archer=archers[currentIdx];
  if(editIndex!==null){ archer.scores[editIndex]=''; editIndex=null; }
  else if(archer.cursor>0){ archer.cursor--; archer.scores[archer.cursor]=''; }
  saveSession(); render();
}

/* ── RESTORE ON LOAD ── */
function restoreSession(saved) {
  archers=saved.archers; currentIdx=saved.currentIdx; sessionMode=saved.sessionMode;
  document.getElementById('btn-x').style.display=sessionMode==='indoor'?'none':'';
  setupTableCols();
  document.getElementById('mode-screen').classList.add('hidden');
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('main-app').style.display='flex';
  switchArcher(currentIdx);
}

window.addEventListener('load', () => {
  const raw=localStorage.getItem(SAVE_KEY);
  if(raw){
    try{
      const saved=JSON.parse(raw);
      if(saved&&saved.archers&&saved.archers.length>0){
        const filled=saved.archers[0].scores.filter(s=>s!=='').length;
        if(filled>0&&confirm(`Restore session for "${saved.archers[0].name}"?\n(${filled} arrows entered)`)){
          restoreSession(saved); return;
        } else { clearSave(); }
      }
    } catch(e){ clearSave(); }
  }
});
</script>
