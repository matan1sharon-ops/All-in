<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; height: 100vh; }
        #table-container { flex: 1; overflow: auto; background: white; color: black; padding: 5px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 11px; }
        th, td { border: 1px solid black; text-align: center; height: 35px; padding: 0; position: relative; }
        
        .active-cell { background: #fff9c4 !important; border: 2px solid orange !important; z-index: 10; }
        .row-label { background: #eee; width: 40px; font-weight: bold; font-size: 9px; }
        .sum-box { background: #f9f9f9; width: 45px; }
        .end-total-box { background: #e3f2fd; font-weight: bold; width: 50px; }
        .running-sum-box { background: #fffde7; font-weight: bold; color: #d32f2f; width: 55px; }
        .stat-box { width: 35px; }

        /* The Diagonal X Box */
        .no-entry { 
            background-image: 
                linear-gradient(to bottom right, transparent calc(50% - 1px), #ccc, transparent calc(50% + 1px)),
                linear-gradient(to bottom left, transparent calc(50% - 1px), #ccc, transparent calc(50% + 1px));
        }

        #pad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 12px; background: #2a2a2a; }
        button { padding: 18px 0; font-size: 22px; font-weight: bold; border-radius: 8px; border: none; box-shadow: 0 3px 0 #111; }
        button:active { transform: translateY(2px); box-shadow: none; opacity: 0.8; }
        
        .gold { background: #FFD700; color: black; }
        .red  { background: #FF4444; color: white; }
        .blue { background: #33AAFF; color: white; }
        .black { background: #333333; color: white; }
        .white { background: #FFFFFF; color: black; }
        .miss  { background: #888888; color: white; }
    </style>
</head>
<body>

<div id="table-container">
    <table>
        <thead>
            <tr style="background:#333; color:white; font-size:9px;">
                <th>Row</th><th>1</th><th>2</th><th>3</th><th>Sum</th><th>Total</th><th>Run</th><th>10-X</th><th>X</th>
            </tr>
        </thead>
        <tbody id="sheet-body"></tbody>
    </table>
</div>

<div id="pad">
    <button class="gold" onclick="add('X')">X</button>
    <button class="gold" onclick="add(10)">10</button>
    <button class="gold" onclick="add(9)">9</button>
    <button class="red" onclick="add(8)">8</button>
    <button class="red" onclick="add(7)">7</button>
    <button class="blue" onclick="add(6)">6</button>
    <button class="blue" onclick="add(5)">5</button>
    <button class="black" onclick="add(4)">4</button>
    <button class="black" onclick="add(3)">3</button>
    <button class="white" onclick="add(2)">2</button>
    <button class="white" onclick="add(1)">1</button>
    <button class="miss" onclick="add('M')">M</button>
</div>

<script>
    let scores = [];
    const body = document.getElementById('sheet-body');

    function render() {
        let html = '';
        let globalRunningTotal = 0;

        for(let e=1; e<=12; e++) {
            let start = (e-1)*6;
            let a = [0,1,2,3,4,5].map(i => scores[start+i] || "");
            let v = a.map(val => (val==='X'||val===10?10:val==='M'?0:Number(val)||0));
            
            let s1 = a[0]!=="" && a[1]!=="" && a[2]!=="" ? v[0]+v[1]+v[2] : "";
            let s2 = a[3]!=="" && a[4]!=="" && a[5]!=="" ? v[3]+v[4]+v[5] : "";
            let endTotal = s2 !== "" ? s1 + s2 : "";
            
            if(endTotal !== "") globalRunningTotal += endTotal;

            let r1_10x = a.slice(0,3).filter(x => x===10 || x==='X').length;
            let r1_x   = a.slice(0,3).filter(x => x==='X').length;
            let r2_10x = a.slice(3,6).filter(x => x===10 || x==='X').length;
            let r2_x   = a.slice(3,6).filter(x => x==='X').length;

            html += `
                <tr>
                    <td class="row-label">row ${e*2-1}</td>
                    <td id="c-${start}" class="${scores.length===start?'active-cell':''}">${a[0]}</td>
                    <td id="c-${start+1}" class="${scores.length===start+1?'active-cell':''}">${a[1]}</td>
                    <td id="c-${start+2}" class="${scores.length===start+2?'active-cell':''}">${a[2]}</td>
                    <td class="sum-box">${s1}</td>
                    <td class="no-entry"></td>
                    <td rowspan="2" class="running-sum-box">${endTotal !== "" ? globalRunningTotal : ""}</td>
                    <td class="stat-box">${a[0]!==""?r1_10x:""}</td>
                    <td class="stat-box">${a[0]!==""?r1_x:""}</td>
                </tr>
                <tr>
                    <td class="row-label">row ${e*2}</td>
                    <td id="c-${start+3}" class="${scores.length===start+3?'active-cell':''}">${a[3]}</td>
                    <td id="c-${start+4}" class="${scores.length===start+4?'active-cell':''}">${a[4]}</td>
                    <td id="c-${start+5}" class="${scores.length===start+5?'active-cell':''}">${a[5]}</td>
                    <td class="sum-box">${s2}</td>
                    <td class="end-total-box">${endTotal}</td>
                    <td class="stat-box">${a[3]!==""?r2_10x:""}</td>
                    <td class="stat-box">${a[3]!==""?r2_x:""}</td>
                </tr>
                <tr style="height:10px; background:#1a1a1a;"><td colspan="9"></td></tr>
            `;
        }
        body.innerHTML = html;
        let next = document.querySelector('.active-cell');
        if(next) next.scrollIntoView({behavior:'smooth', block:'center'});
    }

    function add(v) {
        if(scores.length < 72) { scores.push(v); render(); }
    }
    render();
</script>
</body>
</html>
