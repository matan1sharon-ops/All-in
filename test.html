<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Navigation & Setup Screens */
        .screen { position: absolute; top:0; left:0; width: 100%; height:100%; background: #1a1a1a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .setup-card { background: #2a2a2a; padding: 20px; border-radius: 12px; width: 100%; max-width: 350px; border: 1px solid #444; text-align: center; }
        .setup-card h2 { margin-top: 0; color: #FFD700; }
        .mode-btn { width: 100%; padding: 20px; margin: 10px 0; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; color: white; }
        .out-btn { background: #2e7d32; }
        .in-btn { background: #1565c0; }
        .input-group { margin-bottom: 12px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #1a1a1a; color: white; box-sizing: border-box; }
        .start-btn { width: 100%; padding: 15px; background: #FFD700; color: black; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 10px; }

        /* Main App Interface */
        #main-app { display: none; flex-direction: column; height: 100vh; width: 100%; }
        #archer-tabs { display: flex; background: #333; padding: 5px; gap: 5px; overflow-x: auto; }
        .tab-btn { flex: 1; min-width: 80px; padding: 10px 0; border: none; border-radius: 4px; background: #555; color: white; font-weight: bold; font-size: 11px; white-space: nowrap; }
        .tab-btn.active { background: #2196f3; }
        .settings-btn { width: 40px; background: #444; color: white; border: none; border-radius: 4px; font-size: 18px; }

        #table-container { flex: 1; overflow: auto; background: white; color: black; padding: 5px; }
        .table-title { background: #444; color: white; font-size: 11px; padding: 6px; font-weight: bold; text-align: center; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 13px; margin-bottom: 15px; border: 1.5px solid black; }
        th, td { border: 1px solid #ccc; text-align: center; height: 32px; padding: 0; position: relative; }
        
        /* Layout Columns */
        .col-end { width: 45px; } .col-sum { width: 40px; } .col-tot { width: 48px; } .col-run { width: 55px; } .col-stat { width: 32px; }
        
        .end-label { background: #f0f0f0; font-weight: bold; font-size: 10px; border-right: 1.5px solid black; }
        .sum-box { background: #f9f9f9; border-left: 1px solid black; font-size: 11px; }
        .end-total-box { background: #e3f2fd; font-weight: bold; border-left: 1.5px solid black; }
        .running-sum-box { background: #fffde7; font-weight: bold; color: #d32f2f; border-left: 1.5px solid black; border-right: 1.5px solid black; }
        .stat-box { font-size: 10px; }
        .gold-hit { background-color: #fff9c4 !important; font-weight: bold; }
        .active-cell { border: 2px solid orange !important; z-index: 10; }
        .editing-cell { border: 2.5px solid #2196f3 !important; z-index: 11; background-color: #e3f2fd !important; }
        .end-sep td { border-bottom: 1.5px solid black !important; }
        .half-total-row { background: #444; color: white; font-weight: bold; height: 32px; }

        #session-footer { background: #b71c1c; color: white; display: flex; padding: 0 5px; font-weight: bold; font-size: 14px; height: 45px; align-items: center; border-top: 2px solid white; }
        .foot-label { flex: 1; text-align: left; padding-left: 10px; font-size: 11px; }
        .foot-tot { width: 50px; text-align: center; } .foot-stat { width: 35px; text-align: center; }

        #pad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 10px; background: #2a2a2a; }
        button.pad-btn { padding: 14px 0; font-size: 22px; font-weight: bold; border-radius: 8px; border: none; color: inherit; }
        .gold { background: #FFD700; color: black; } .red { background: #FF4444; color: white; } .blue { background: #33AAFF; color: white; }
        .black { background: #333333; color: white; } .white { background: #FFFFFF; color: black; } .miss { background: #888888; color: white; }
        .backspace { background: #555; color: white; }
        .export-btn { background: #4CAF50 !important; color: white !important; grid-column: span 4; font-size: 16px !important; margin-top: 4px; padding: 10px 0 !important; }
    </style>
</head>
<body>

<div id="mode-screen" class="screen">
    <div class="setup-card">
        <h2>SELECT SESSION</h2>
        <button class="mode-btn out-btn" onclick="selectMode('outdoor')">OUTDOOR (50m - 72arr)</button>
        <button class="mode-btn in-btn" onclick="selectMode('indoor')">INDOOR (18m - 60arr)</button>
    </div>
</div>

<div id="setup-screen" class="screen" style="display:none;">
    <div class="setup-card">
        <h2 id="setup-title">SETUP</h2>
        <div id="archer-inputs">
            <div class="input-group"><label>Archer 1 Name</label><input type="text" id="name-0" value="Archer 1"></div>
            <div class="input-group"><label>Archer 2 Name</label><input type="text" id="name-1" placeholder="Optional"></div>
            <div class="input-group"><label>Archer 3 Name</label><input type="text" id="name-2" placeholder="Optional"></div>
            <div class="input-group"><label>Archer 4 Name</label><input type="text" id="name-3" placeholder="Optional"></div>
        </div>
        <button class="start-btn" onclick="startSession()">START SESSION</button>
    </div>
</div>

<div id="main-app">
    <div id="archer-tabs"></div>
    <div id="table-container">
        <div class="table-title" id="title-h1">1st Half</div>
        <table id="table-1"><tbody id="body-1"></tbody></table>
        <div class="table-title" id="title-h2">2nd Half</div>
        <table id="table-2"><tbody id="body-2"></tbody></table>
    </div>
    <div id="session-footer">
        <div class="foot-label" id="footer-name">TOTAL:</div>
        <div class="foot-tot" id="gt-score">0</div>
        <div class="foot-stat" id="gt-stat1">0</div>
        <div class="foot-stat" id="gt-stat2">0</div>
    </div>
    <div id="pad">
        <button class="pad-btn gold" onclick="handleInput('X')">X</button>
        <button class="pad-btn gold" onclick="handleInput(10)">10</button>
        <button class="pad-btn gold" onclick="handleInput(9)">9</button>
        <button class="pad-btn red" onclick="handleInput(8)">8</button>
        <button class="pad-btn red" onclick="handleInput(7)">7</button>
        <button class="pad-btn blue" onclick="handleInput(6)">6</button>
        <button class="pad-btn blue" onclick="handleInput(5)">5</button>
        <button class="pad-btn black" onclick="handleInput(4)">4</button>
        <button class="pad-btn black" onclick="handleInput(3)">3</button>
        <button class="pad-btn white" onclick="handleInput(2)">2</button>
        <button class="pad-btn white" onclick="handleInput(1)">1</button>
        <button class="pad-btn miss" onclick="handleInput('M')">M</button>
        <button class="pad-btn backspace" style="grid-column: span 4;" onclick="backspace()">BACKSPACE ←</button>
        <button class="pad-btn export-btn" onclick="exportCSV()">EXPORT CURRENT ARCHER (CSV)</button>
    </div>
</div>

<script>
    let archers = [];
    let currentIdx = 0;
    let editIndex = null;
    let sessionMode = 'outdoor';

    function selectMode(m) {
        sessionMode = m;
        document.getElementById('mode-screen').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'flex';
    }

    function startSession() {
        archers = [];
        const count = (sessionMode === 'outdoor' ? 72 : 60);
        for(let i=0; i<4; i++) {
            let n = document.getElementById(`name-${i}`).value.trim();
            if(n !== "" || i === 0) archers.push({ name: n || `Archer ${i+1}`, scores: Array(count).fill(""), cursor: 0 });
        }
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        document.getElementById('title-h1').innerText = (sessionMode === 'outdoor' ? "1st Half (Ends 1-6)" : "1st Half (Ends 1-10)");
        document.getElementById('title-h2').innerText = (sessionMode === 'outdoor' ? "2nd Half (Ends 7-12)" : "2nd Half (Ends 11-20)");
        switchArcher(0);
    }

    function switchArcher(idx) {
        currentIdx = idx; editIndex = null;
        let tabs = '';
        archers.forEach((a, i) => { tabs += `<button class="tab-btn ${i===idx?'active':''}" onclick="switchArcher(${i})">${a.name.toUpperCase()}</button>`; });
        tabs += `<button class="settings-btn" onclick="location.reload()">⚙</button>`;
        document.getElementById('archer-tabs').innerHTML = tabs;
        document.getElementById('footer-name').innerText = archers[idx].name.toUpperCase() + " TOTAL:";
        render();
    }

    function render() {
        let archer = archers[currentIdx];
        let h1, h2;
        if(sessionMode === 'outdoor') {
            h1 = renderOutdoor(0, 6, "body-1", archer);
            h2 = renderOutdoor(6, 12, "body-2", archer);
        } else {
            h1 = renderIndoor(0, 10, "body-1", archer);
            h2 = renderIndoor(10, 20, "body-2", archer);
        }
        document.getElementById('gt-score').innerText = h1.score + h2.score;
        document.getElementById('gt-stat1').innerText = h1.s1 + h2.s1;
        document.getElementById('gt-stat2').innerText = h1.s2 + h2.s2;
        let target = document.querySelector('.editing-cell') || document.querySelector('.active-cell');
        if(target) target.scrollIntoView({behavior:'smooth', block:'center'});
    }

    function renderOutdoor(startEnd, endEnd, bodyId, archer) {
        let html = '', running = 0, tens = 0, xs = 0;
        for(let e = startEnd + 1; e <= endEnd; e++) {
            let s = (e-1)*6; let a = archer.scores.slice(s, s+6);
            let v = a.map(x => (x==='X'||x===10?10:x==='M'?0:Number(x)||0));
            let sum1 = (a[0]!==""&&a[1]!==""&&a[2]!=="") ? v[0]+v[1]+v[2] : "";
            let sum2 = (a[3]!==""&&a[4]!==""&&a[5]!=="") ? v[3]+v[4]+v[5] : "";
            let endTotal = sum2 !== "" ? (Number(sum1)||0) + sum2 : "";
            if(endTotal !== "") running += endTotal;
            let c10 = a.filter(x => x===10 || x==='X').length, cx = a.filter(x => x==='X').length;
            if(a[0]!=="") { tens += c10; xs += cx; }

            html += `<tr><td rowspan="2" class="end-label">${e}</td>${cellHtml(s, a[0])}${cellHtml(s+1, a[1])}${cellHtml(s+2, a[2])}<td class="sum-box">${sum1}</td><td rowspan="2" class="running-sum-box">${endTotal!==""?running:""}</td><td class="stat-box">${a[0]!==""?c10:""}</td><td class="stat-box">${a[0]!==""?cx:""}</td></tr>
                     <tr class="end-sep">${cellHtml(s+3, a[3])}${cellHtml(s+4, a[4])}${cellHtml(s+5, a[5])}<td class="sum-box">${sum2}</td><td class="end-total-box">${endTotal}</td><td class="stat-box"></td></tr>`;
        }
        html += `<tr class="half-total-row"><td colspan="5">HALF TOTAL</td><td>${running}</td><td>${tens}</td><td>${xs}</td></tr>`;
        document.getElementById(bodyId).innerHTML = html;
        return { score: running, s1: tens, s2: xs };
    }

    function renderIndoor(startEnd, endEnd, bodyId, archer) {
        let html = '', running = 0, tens = 0, nines = 0;
        for(let e = startEnd + 1; e <= endEnd; e++) {
            let s = (e-1)*3; let a = archer.scores.slice(s, s+3);
            let v = a.map(x => (x==='X'||x===10?10:x==='M'?0:Number(x)||0));
            let endTotal = (a[0]!==""&&a[1]!==""&&a[2]!=="") ? v[0]+v[1]+v[2] : "";
            if(endTotal !== "") running += endTotal;
            let c10 = a.filter(x => x===10 || x==='X').length, c9 = a.filter(x => x===9).length;
            if(a[0]!=="") { tens += c10; nines += c9; }

            html += `<tr class="end-sep"><td class="end-label">${e}</td>${cellHtml(s, a[0])}${cellHtml(s+1, a[1])}${cellHtml(s+2, a[2])}<td class="end-total-box">${endTotal}</td><td class="running-sum-box">${endTotal!==""?running:""}</td><td class="stat-box">${a[0]!==""?c10:""}</td><td class="stat-box">${a[0]!==""?c9:""}</td></tr>`;
        }
        html += `<tr class="half-total-row"><td colspan="4">HALF TOTAL</td><td>${running}</td><td></td><td>${tens}</td><td>${nines}</td></tr>`;
        document.getElementById(bodyId).innerHTML = html;
        return { score: running, s1: tens, s2: nines };
    }

    function cellHtml(idx, val) {
        let archer = archers[currentIdx];
        let classList = [];
        if (val === 'X' || val === 10 || val === 9) classList.push("gold-hit");
        if (editIndex === idx) classList.push("editing-cell");
        else if (editIndex === null && archer.cursor === idx) classList.push("active-cell");
        return `<td class="${classList.join(' ')}" onclick="selectCell(${idx})">${val}</td>`;
    }

    function selectCell(idx) { editIndex = (editIndex === idx) ? null : idx; render(); }

    function handleInput(val) {
        let archer = archers[currentIdx];
        const step = (sessionMode === 'outdoor' ? 6 : 3);
        if (editIndex !== null) { archer.scores[editIndex] = val; editIndex = null; }
        else if (archer.cursor < archer.scores.length) {
            archer.scores[archer.cursor] = val; archer.cursor++;
            if (archer.cursor % step === 0) {
                render();
                setTimeout(() => { switchArcher((currentIdx + 1) % archers.length); }, 100);
                return;
            }
        }
        render();
    }

    function backspace() {
        let archer = archers[currentIdx];
        if (editIndex !== null) { archer.scores[editIndex] = ""; editIndex = null; }
        else if (archer.cursor > 0) { archer.cursor--; archer.scores[archer.cursor] = ""; }
        render();
    }

    function exportCSV() {
        let archer = archers[currentIdx];
        let csv = "data:text/csv;charset=utf-8,ARCHER: " + archer.name.toUpperCase() + "\n\n";
        if(sessionMode === 'outdoor') {
            csv += "End,A1,A2,A3,A4,A5,A6,Total,10+X,X\n";
            for(let i=0; i<12; i++) {
                let r = archer.scores.slice(i*6, i*6+6);
                let t = r.reduce((acc, curr) => acc + (curr==='X'||curr===10?10:curr==='M'?0:Number(curr)||0), 0);
                csv += `${i+1},${r.join(",")},${t},${r.filter(x=>x===10||x==='X').length},${r.filter(x=>x==='X').length}\n`;
            }
        } else {
            csv += "End,A1,A2,A3,Total,10s,9s\n";
            for(let i=0; i<20; i++) {
                let r = archer.scores.slice(i*3, i*3+3);
                let t = r.reduce((acc, curr) => acc + (curr==='X'||curr===10?10:curr==='M'?0:Number(curr)||0), 0);
                csv += `${i+1},${r.join(",")},${t},${r.filter(x=>x===10||x==='X').length},${r.filter(x=>x===9).length}\n`;
            }
        }
        let link = document.createElement("a"); link.setAttribute("href", encodeURI(csv));
        link.setAttribute("download", `${archer.name}_Scorecard.csv`);
        link.click();
    }
</script>
</body>
</html>
