<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --bg: #111;
    --surface: #1e1e1e;
    --surface2: #2a2a2a;
    --border: #383838;
    --accent: #FFD700;
    --accent2: #FFA500;
    --red: #e53935;
    --blue: #1e88e5;
    --green: #43a047;
    --text: #f0f0f0;
    --muted: #888;
    --tab-active: #2196f3;
    --radius: 10px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Barlow', sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* ── SCREENS ── */
  .screen {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    opacity: 1;
    transition: opacity 0.2s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  .setup-card {
    background: var(--surface);
    padding: 24px 20px;
    border-radius: 16px;
    width: 100%;
    max-width: 360px;
    border: 1px solid var(--border);
  }

  .setup-card h2 {
    margin: 0 0 20px;
    text-align: center;
    color: var(--accent);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 2px;
  }

  .mode-btn {
    width: 100%;
    padding: 18px 20px;
    margin: 8px 0;
    border-radius: var(--radius);
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    color: white;
    transition: transform 0.1s, filter 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .mode-btn:active { transform: scale(0.97); filter: brightness(0.9); }
  .out-btn  { background: linear-gradient(135deg, #2e7d32, #388e3c); }
  .in-btn   { background: linear-gradient(135deg, #1565c0, #1976d2); }
  .mode-btn .icon { font-size: 22px; }
  .mode-btn .label { flex: 1; text-align: left; }
  .mode-btn .sub { font-size: 11px; font-weight: 400; opacity: 0.8; font-family: 'Barlow', sans-serif; letter-spacing: 0; }

  .input-group { margin-bottom: 12px; }
  .input-group label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-group input {
    width: 100%;
    padding: 11px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-group input:focus { border-color: var(--tab-active); }

  .back-link {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    cursor: pointer;
    padding: 8px 0;
    margin-bottom: 12px;
    align-self: flex-start;
  }

  .start-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 17px;
    letter-spacing: 1px;
    margin-top: 8px;
    cursor: pointer;
    transition: transform 0.1s, filter 0.15s;
  }
  .start-btn:active { transform: scale(0.97); filter: brightness(0.9); }

  /* ── MAIN APP ── */
  #main-app {
    display: none;
    flex-direction: column;
    height: 100dvh;
    width: 100%;
  }

  /* Tabs */
  #archer-tabs {
    display: flex;
    background: var(--surface);
    padding: 6px;
    gap: 5px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab-btn {
    flex: 1;
    min-width: 0;
    padding: 9px 4px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .tab-btn.active { background: var(--tab-active); color: #fff; }
  .settings-btn {
    width: 36px;
    flex-shrink: 0;
    background: transparent;
    color: var(--muted);
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: color 0.15s;
  }
  .settings-btn:hover { color: var(--text); }

  /* Table area */
  #table-container {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    background: #fff;
    color: #111;
  }

  .half-header {
    display: grid;
    grid-template-columns: 1fr 36px 36px;
    background: #444;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-align: center;
    padding: 3px 0;
  }
  .half-header .half-title { text-align: left; padding-left: 10px; }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    font-size: 13px;
    border: 1.5px solid #999;
    margin-bottom: 0;
  }
  th, td {
    border: 1px solid #ccc;
    text-align: center;
    height: 32px;
    padding: 0;
    position: relative;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
  }

  .col-end  { width: 46px; }
  .col-arr  { width: auto; }
  .col-sum  { width: 36px; }
  .col-tot  { width: 38px; }
  .col-run  { width: 46px; }
  .col-stat { width: 32px; }

  .end-label        { background: #f0f0f0; font-weight: 700; font-size: 10px; color: #333; border-right: 1.5px solid #999; }
  .sum-box          { background: #f5f5f5; border-left: 1px solid #bbb; color: #555; font-size: 12px; }
  .end-total-box    { background: #e3f2fd; font-weight: 700; border-left: 1.5px solid #999; color: #1565c0; }
  .running-sum-box  { background: #fff8e1; font-weight: 700; color: #c62828; border-left: 1.5px solid #999; border-right: 1.5px solid #999; font-size: 13px; }
  .stat-box         { font-size: 11px; color: #555; background: #fafafa; }

  .gold-hit         { background-color: #fff9c4 !important; color: #5d4037 !important; font-weight: 700; }
  .active-cell      { background-color: #fff3e0 !important; outline: 2.5px solid #FF9800; outline-offset: -2px; z-index: 10; }
  .editing-cell     { background-color: #e3f2fd !important; outline: 2.5px solid #2196f3; outline-offset: -2px; z-index: 11; }
  .no-entry         { background-image: repeating-linear-gradient(135deg, transparent, transparent 4px, #e0e0e0 4px, #e0e0e0 5px); }

  .end-sep td       { border-bottom: 1.5px solid #999 !important; }
  .half-total-row   { background: #37474f !important; color: #fff !important; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; height: 30px; }
  .half-total-row td { border-color: #546e7a; color: #fff; }

  /* End-complete flash */
  @keyframes endFlash {
    0%   { background-color: #c8e6c9; }
    100% { background-color: inherit; }
  }
  .end-complete-flash td { animation: endFlash 0.6s ease-out; }

  /* Footer */
  #session-footer {
    background: #b71c1c;
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 8px;
    height: 42px;
    border-top: 2px solid #7f0000;
    flex-shrink: 0;
    gap: 4px;
  }
  .foot-label {
    flex: 1;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .foot-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    width: 42px;
    text-align: center;
    background: rgba(0,0,0,0.2);
    border-radius: 4px;
    padding: 2px 0;
  }
  .foot-val-label {
    font-size: 8px;
    font-weight: 600;
    text-align: center;
    width: 42px;
    opacity: 0.7;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    font-family: 'Barlow', sans-serif;
    display: none; /* hidden on small screens */
  }

  /* Pad */
  #pad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    padding: 8px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .pad-btn {
    padding: 0;
    height: 52px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    box-shadow: 0 3px 0 rgba(0,0,0,0.35);
    transition: transform 0.08s, box-shadow 0.08s, filter 0.1s;
    position: relative;
    top: 0;
    letter-spacing: 0.5px;
  }
  .pad-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.35);
    filter: brightness(0.92);
  }

  .gold   { background: #FFD700; color: #3e2000; }
  .red    { background: #e53935; color: white; }
  .blue   { background: #1e88e5; color: white; }
  .black  { background: #2d2d2d; color: white; border: 1px solid #555; }
  .white  { background: #f5f5f5; color: #111; border: 1px solid #ccc; }
  .miss   { background: #757575; color: white; }
  .backspace-btn {
    grid-column: span 4;
    background: #333;
    color: #aaa;
    font-size: 16px;
    height: 44px;
    letter-spacing: 1px;
  }
  .export-btn {
    grid-column: span 4;
    background: #1b5e20;
    color: #a5d6a7;
    font-size: 14px;
    height: 40px;
    letter-spacing: 0.5px;
  }

  /* Archer complete banner */
  #next-archer-banner {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    animation: fadeIn 0.2s ease;
  }
  #next-archer-banner.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .banner-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    text-align: center;
    max-width: 300px;
    width: 90%;
  }
  .banner-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .banner-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .banner-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .banner-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- MODE SCREEN -->
<div id="mode-screen" class="screen">
  <div class="setup-card">
    <h2>🏹 SELECT MODE</h2>
    <button class="mode-btn out-btn" onclick="selectMode('outdoor')">
      <span class="icon">☀️</span>
      <span class="label">OUTDOOR<br><span class="sub">72 arrows · 12 ends · 6 per end</span></span>
    </button>
    <button class="mode-btn in-btn" onclick="selectMode('indoor')">
      <span class="icon">🏛️</span>
      <span class="label">INDOOR<br><span class="sub">60 arrows · 20 ends · 3 per end</span></span>
    </button>
  </div>
</div>

<!-- SETUP SCREEN -->
<div id="setup-screen" class="screen hidden">
  <div class="setup-card">
    <button class="back-link" onclick="goBack()">← Back</button>
    <h2 id="setup-title">ARCHER SETUP</h2>
    <div id="archer-inputs">
      <div class="input-group"><label>Archer 1 Name</label><input type="text" id="name-0" value="Archer 1" autocomplete="off"></div>
      <div class="input-group"><label>Archer 2 Name <span style="color:#555">(optional)</span></label><input type="text" id="name-1" placeholder="Leave blank to skip" autocomplete="off"></div>
      <div class="input-group"><label>Archer 3 Name <span style="color:#555">(optional)</span></label><input type="text" id="name-2" placeholder="Leave blank to skip" autocomplete="off"></div>
      <div class="input-group"><label>Archer 4 Name <span style="color:#555">(optional)</span></label><input type="text" id="name-3" placeholder="Leave blank to skip" autocomplete="off"></div>
    </div>
    <button class="start-btn" onclick="startSession()">START SESSION →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app">
  <div id="archer-tabs"></div>

  <div id="table-container">
    <div class="half-header">
      <div class="half-title" id="h1-main-title">1st HALF</div>
      <div id="h1-s1"></div><div id="h1-s2"></div>
    </div>
    <table><colgroup id="col-group-1"></colgroup><tbody id="body-1"></tbody></table>

    <div class="half-header" style="margin-top: 8px;">
      <div class="half-title" id="h2-main-title">2nd HALF</div>
      <div id="h2-s1"></div><div id="h2-s2"></div>
    </div>
    <table><colgroup id="col-group-2"></colgroup><tbody id="body-2"></tbody></table>
    <div style="height: 12px;"></div>
  </div>

  <div id="session-footer">
    <div class="foot-label" id="footer-name">TOTAL:</div>
    <div>
      <div class="foot-val" id="gt-score">0</div>
    </div>
    <div>
      <div class="foot-val" id="gt-stat1">0</div>
    </div>
    <div>
      <div class="foot-val" id="gt-stat2">0</div>
    </div>
  </div>

  <div id="pad">
    <button id="btn-x"       class="pad-btn gold"         onclick="handleInput('X')">X</button>
    <button                  class="pad-btn gold"         onclick="handleInput(10)">10</button>
    <button                  class="pad-btn gold"         onclick="handleInput(9)">9</button>
    <button                  class="pad-btn red"          onclick="handleInput(8)">8</button>
    <button                  class="pad-btn red"          onclick="handleInput(7)">7</button>
    <button                  class="pad-btn blue"         onclick="handleInput(6)">6</button>
    <button                  class="pad-btn blue"         onclick="handleInput(5)">5</button>
    <button                  class="pad-btn black"        onclick="handleInput(4)">4</button>
    <button                  class="pad-btn black"        onclick="handleInput(3)">3</button>
    <button                  class="pad-btn white"        onclick="handleInput(2)">2</button>
    <button                  class="pad-btn white"        onclick="handleInput(1)">1</button>
    <button                  class="pad-btn miss"         onclick="handleInput('M')">M</button>
    <button                  class="pad-btn backspace-btn" onclick="backspace()">BACKSPACE ←</button>
    <button                  class="pad-btn export-btn"   onclick="exportCSV()">EXPORT CSV</button>
  </div>
</div>

<!-- NEXT ARCHER BANNER -->
<div id="next-archer-banner">
  <div class="banner-card">
    <div class="banner-title">End complete — next up</div>
    <div class="banner-name" id="banner-name">—</div>
    <div class="banner-sub" id="banner-sub"></div>
    <button class="banner-btn" onclick="dismissBanner()">READY →</button>
  </div>
</div>

<script>
let archers = [], currentIdx = 0, editIndex = null, sessionMode = 'outdoor';
let pendingNextIdx = -1;

function selectMode(m) {
  sessionMode = m;
  document.getElementById('btn-x').style.display = (m === 'indoor' ? 'none' : '');
  // Fix grid when X is hidden: make 10 span full first slot
  document.getElementById('btn-x').style.gridColumn = (m === 'indoor' ? 'span 0' : '');
  showScreen('setup-screen');
}

function goBack() { showScreen('mode-screen'); }

function showScreen(id) {
  ['mode-screen','setup-screen'].forEach(s => {
    const el = document.getElementById(s);
    if (s === id) el.classList.remove('hidden');
    else el.classList.add('hidden');
  });
}

function startSession() {
  archers = [];
  const count = sessionMode === 'outdoor' ? 72 : 60;
  for (let i = 0; i < 4; i++) {
    const n = document.getElementById(`name-${i}`).value.trim();
    if (n !== '' || i === 0)
      archers.push({ name: n || `Archer ${i+1}`, scores: Array(count).fill(''), cursor: 0 });
  }

  const outCols = '<col class="col-end"><col class="col-arr"><col class="col-arr"><col class="col-arr"><col class="col-sum"><col class="col-tot"><col class="col-run"><col class="col-stat"><col class="col-stat">';
  const inCols  = '<col class="col-end"><col class="col-arr"><col class="col-arr"><col class="col-arr"><col class="col-tot"><col class="col-run"><col class="col-stat"><col class="col-stat">';
  document.getElementById('col-group-1').innerHTML = document.getElementById('col-group-2').innerHTML =
    (sessionMode === 'outdoor' ? outCols : inCols);

  const s1Lab = sessionMode === 'outdoor' ? '10+X' : '10';
  const s2Lab = sessionMode === 'outdoor' ? 'X'    : '9';
  document.getElementById('h1-s1').innerText = document.getElementById('h2-s1').innerText = s1Lab;
  document.getElementById('h1-s2').innerText = document.getElementById('h2-s2').innerText = s2Lab;
  document.getElementById('h1-main-title').innerText = sessionMode === 'outdoor' ? '1st HALF  (Ends 1–6)'  : '1st HALF  (Ends 1–10)';
  document.getElementById('h2-main-title').innerText = sessionMode === 'outdoor' ? '2nd HALF  (Ends 7–12)' : '2nd HALF  (Ends 11–20)';

  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('main-app').style.display = 'flex';
  switchArcher(0);
}

function switchArcher(idx) {
  currentIdx = idx;
  editIndex = null;
  renderTabs();
  document.getElementById('footer-name').innerText = archers[idx].name.toUpperCase() + '  TOTAL:';
  render();
}

function renderTabs() {
  let tabs = '';
  archers.forEach((a, i) => {
    tabs += `<button class="tab-btn ${i === currentIdx ? 'active' : ''}" onclick="switchArcher(${i})">${a.name.toUpperCase()}</button>`;
  });
  tabs += `<button class="settings-btn" onclick="confirmReset()" title="New session">⚙</button>`;
  document.getElementById('archer-tabs').innerHTML = tabs;
}

function confirmReset() {
  if (confirm('Start a new session? All current scores will be lost.')) location.reload();
}

function render() {
  const archer = archers[currentIdx];
  let h1, h2;
  if (sessionMode === 'outdoor') {
    h1 = renderOutdoor(0,  6, 'body-1', archer);
    h2 = renderOutdoor(6, 12, 'body-2', archer);
  } else {
    h1 = renderIndoor(0,  10, 'body-1', archer);
    h2 = renderIndoor(10, 20, 'body-2', archer);
  }
  document.getElementById('gt-score').innerText = h1.score + h2.score;
  document.getElementById('gt-stat1').innerText = h1.s1 + h2.s1;
  document.getElementById('gt-stat2').innerText = h1.s2 + h2.s2;

  const target = document.querySelector('.editing-cell') || document.querySelector('.active-cell');
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function renderOutdoor(startEnd, endEnd, bodyId, archer) {
  let html = '', running = 0, tens = 0, xs = 0;
  for (let e = startEnd + 1; e <= endEnd; e++) {
    const sIdx = (e - 1) * 6;
    const a = archer.scores.slice(sIdx, sIdx + 6);
    const v = a.map(val => val === 'X' || val === 10 ? 10 : val === 'M' ? 0 : Number(val) || 0);
    const s1 = (a[0] !== '' && a[1] !== '' && a[2] !== '') ? v[0]+v[1]+v[2] : '';
    const s2 = (a[3] !== '' && a[4] !== '' && a[5] !== '') ? v[3]+v[4]+v[5] : '';
    const et = s2 !== '' ? (Number(s1)||0) + s2 : '';
    if (et !== '') running += et;
    const c10 = a.filter(x => x === 10 || x === 'X').length;
    const cx  = a.filter(x => x === 'X').length;
    if (a[0] !== '') { tens += c10; xs += cx; }
    const endDone = et !== '';
    html += `<tr${endDone ? ' class="end-complete"' : ''}>`
      + `<td rowspan="2" class="end-label">End ${e}</td>`
      + cellHtml(sIdx,   a[0]) + cellHtml(sIdx+1, a[1]) + cellHtml(sIdx+2, a[2])
      + `<td class="sum-box">${s1}</td><td class="no-entry"></td>`
      + `<td rowspan="2" class="running-sum-box">${et !== '' ? running : ''}</td>`
      + `<td class="stat-box">${a[0] !== '' ? c10 : ''}</td><td class="stat-box">${a[0] !== '' ? cx : ''}</td>`
      + `</tr><tr class="end-sep">`
      + cellHtml(sIdx+3, a[3]) + cellHtml(sIdx+4, a[4]) + cellHtml(sIdx+5, a[5])
      + `<td class="sum-box">${s2}</td><td class="end-total-box">${et}</td>`
      + `<td class="stat-box"></td><td class="stat-box"></td></tr>`;
  }
  html += `<tr class="half-total-row"><td colspan="5">HALF TOTAL</td><td>${running}</td><td></td><td>${tens}</td><td>${xs}</td></tr>`;
  document.getElementById(bodyId).innerHTML = html;
  return { score: running, s1: tens, s2: xs };
}

function renderIndoor(startEnd, endEnd, bodyId, archer) {
  let html = '', running = 0, tens = 0, nines = 0;
  for (let e = startEnd + 1; e <= endEnd; e++) {
    const sIdx = (e - 1) * 3;
    const a = archer.scores.slice(sIdx, sIdx + 3);
    const v = a.map(val => val === 'X' || val === 10 ? 10 : val === 'M' ? 0 : Number(val) || 0);
    const et = (a[0] !== '' && a[1] !== '' && a[2] !== '') ? v[0]+v[1]+v[2] : '';
    if (et !== '') running += et;
    const c10 = a.filter(x => x === 10 || x === 'X').length;
    const c9  = a.filter(x => x === 9).length;
    if (a[0] !== '') { tens += c10; nines += c9; }
    html += `<tr class="end-sep">`
      + `<td class="end-label">End ${e}</td>`
      + cellHtml(sIdx, a[0]) + cellHtml(sIdx+1, a[1]) + cellHtml(sIdx+2, a[2])
      + `<td class="end-total-box">${et}</td>`
      + `<td class="running-sum-box">${et !== '' ? running : ''}</td>`
      + `<td class="stat-box">${a[0] !== '' ? c10 : ''}</td>`
      + `<td class="stat-box">${a[0] !== '' ? c9 : ''}</td>`
      + `</tr>`;
  }
  html += `<tr class="half-total-row"><td colspan="4">HALF TOTAL</td><td>${running}</td><td></td><td>${tens}</td><td>${nines}</td></tr>`;
  document.getElementById(bodyId).innerHTML = html;
  return { score: running, s1: tens, s2: nines };
}

function cellHtml(idx, val) {
  const archer = archers[currentIdx];
  const classes = [];
  if (val === 'X' || val === 10 || val === 9) classes.push('gold-hit');
  if (editIndex === idx) classes.push('editing-cell');
  else if (editIndex === null && archer.cursor === idx) classes.push('active-cell');
  return `<td class="${classes.join(' ')}" onclick="selectCell(${idx})">${val}</td>`;
}

function selectCell(idx) {
  editIndex = (editIndex === idx) ? null : idx;
  render();
}

function handleInput(val) {
  const archer = archers[currentIdx];
  const step = sessionMode === 'outdoor' ? 6 : 3;

  if (editIndex !== null) {
    archer.scores[editIndex] = val;
    editIndex = null;
    render();
    return;
  }

  if (archer.cursor >= archer.scores.length) return;

  archer.scores[archer.cursor] = val;
  archer.cursor++;

  // End just completed?
  if (archer.cursor % step === 0) {
    render(); // draw the completed end first
    const nextIdx = (currentIdx + 1) % archers.length;
    if (archers.length > 1) {
      showBanner(nextIdx);
    }
    // Single archer: just stay, render is already done
    return;
  }

  render();
}

function showBanner(nextIdx) {
  pendingNextIdx = nextIdx;
  document.getElementById('banner-name').innerText = archers[nextIdx].name.toUpperCase();
  document.getElementById('banner-sub').innerText = `End ${Math.floor(archers[nextIdx].cursor / (sessionMode === 'outdoor' ? 6 : 3)) + 1}`;
  document.getElementById('next-archer-banner').classList.add('show');
}

function dismissBanner() {
  document.getElementById('next-archer-banner').classList.remove('show');
  if (pendingNextIdx >= 0) {
    switchArcher(pendingNextIdx);
    pendingNextIdx = -1;
  }
}

function backspace() {
  const archer = archers[currentIdx];
  if (editIndex !== null) {
    archer.scores[editIndex] = '';
    editIndex = null;
  } else if (archer.cursor > 0) {
    archer.cursor--;
    archer.scores[archer.cursor] = '';
  }
  render();
}

function exportCSV() {
  const archer = archers[currentIdx];
  let csv = 'data:text/csv;charset=utf-8,ARCHER: ' + archer.name.toUpperCase() + '\n\n';
  if (sessionMode === 'outdoor') {
    csv += 'End,A1,A2,A3,Sum1,A4,A5,A6,Sum2,Total,10+X,X\n';
    for (let i = 0; i < 12; i++) {
      const r = archer.scores.slice(i*6, i*6+6);
      const v = r.map(x => (x==='X'||x===10?10:x==='M'?0:Number(x)||0));
      csv += `${i+1},${r.join(',')},${v[0]+v[1]+v[2]},${v[3]+v[4]+v[5]},${v.reduce((a,b)=>a+b,0)},${r.filter(x=>x===10||x==='X').length},${r.filter(x=>x==='X').length}\n`;
    }
  } else {
    csv += 'End,A1,A2,A3,Total,10s,9s\n';
    for (let i = 0; i < 20; i++) {
      const r = archer.scores.slice(i*3, i*3+3);
      const v = r.map(x => (x==='X'||x===10?10:x==='M'?0:Number(x)||0));
      csv += `${i+1},${r.join(',')},${v.reduce((a,b)=>a+b,0)},${r.filter(x=>x===10||x==='X').length},${r.filter(x=>x===9).length}\n`;
    }
  }
  const link = document.createElement('a');
  link.setAttribute('href', encodeURI(csv));
  link.setAttribute('download', `${archer.name}_Scorecard.csv`);
  link.click();
}
</script>
</body>
</html>
