<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Setup Screen */
        #setup-screen { position: absolute; top:0; left:0; width: 100%; height:100%; background: #1a1a1a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .setup-card { background: #2a2a2a; padding: 20px; border-radius: 12px; width: 100%; max-width: 350px; border: 1px solid #444; }
        .setup-card h2 { margin-top: 0; text-align: center; color: #FFD700; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #1a1a1a; color: white; box-sizing: border-box; }
        .start-btn { width: 100%; padding: 15px; background: #4CAF50; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 10px; }

        /* Main App Interface */
        #main-app { display: none; flex-direction: column; height: 100vh; width: 100%; }

        #archer-tabs { display: flex; background: #333; padding: 5px; gap: 5px; overflow-x: auto; }
        .tab-btn { flex: 1; min-width: 80px; padding: 10px 0; border: none; border-radius: 4px; background: #555; color: white; font-weight: bold; font-size: 11px; white-space: nowrap; }
        .tab-btn.active { background: #2196f3; }
        .settings-btn { width: 40px; background: #444; color: white; border: none; border-radius: 4px; font-size: 18px; }

        #table-container { flex: 1; overflow: auto; background: white; color: black; padding: 5px; }
        .table-title { background: #444; color: white; font-size: 11px; padding: 6px; font-weight: bold; text-align: center; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 13px; margin-bottom: 20px; border: 1.5px solid black; }
        th, td { border: 1px solid #ccc; text-align: center; height: 32px; padding: 0; position: relative; }
        
        .col-end { width: 45px; } .col-arr { width: auto; } .col-sum { width: 45px; }
        .col-tot { width: 50px; } .col-run { width: 55px; } .col-stat { width: 35px; }

        .end-label { background: #f0f0f0; font-weight: bold; font-size: 10px; border-right: 1.5px solid black; }
        .sum-box { background: #f9f9f9; border-left: 1px solid black; }
        .end-total-box { background: #e3f2fd; font-weight: bold; border-left: 1.5px solid black; }
        .running-sum-box { background: #fffde7; font-weight: bold; color: #d32f2f; border-left: 1.5px solid black; border-right: 1.5px solid black; }
        .stat-box { font-size: 11px; }

        .active-cell { background: #fff9c4 !important; border: 2px solid orange !important; z-index: 10; }
        .editing-cell { background: #fff176 !important; border: 2.5px solid #2196f3 !important; z-index: 11; }
        .no-entry { background-image: linear-gradient(to bottom right, transparent 49%, #ddd 50%, transparent 51%), linear-gradient(to bottom left, transparent 49%, #ddd 50%, transparent 51%); }
        .end-sep td { border-bottom: 1.5px solid black !important; }
        .half-total-row { background: #444; color: white; font-weight: bold; height: 32px; }

        #session-footer { background: #b71c1c; color: white; display: flex; padding: 0 5px; font-weight: bold; font-size: 14px; height: 45px; align-items: center; border-top: 2px solid white; }
        .foot-label { flex: 1; text-align: left; padding-left: 10px; font-size: 11px; overflow: hidden; text-overflow: ellipsis; }
        .foot-sum { width: 45px; } .foot-tot { width: 50px; text-align: center; } .foot-run { width: 55px; } .foot-stat { width: 35px; text-align: center; }

        #pad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 10px; background: #2a2a2a; }
        button.pad-btn { padding: 14px 0; font-size: 22px; font-weight: bold; border-radius: 8px; border: none; box-shadow: 0 3px 0 #000; color: inherit; }
        .gold { background: #FFD700; color: black; }
        .red { background: #FF4444; color: white; }
        .blue { background: #33AAFF; color: white; }
        .black { background: #333333; color: white; }
        .white { background: #FFFFFF; color: black; }
        .miss { background: #888888; color: white; }
        .backspace { background: #555; color: white; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="setup-card">
        <h2>SESSION SETUP</h2>
        <div id="archer-inputs">
            <div class="input-group">
                <label>Archer 1 Name</label>
                <input type="text" id="name-0" value="Archer 1">
            </div>
            <div class="input-group">
                <label>Archer 2 Name (Optional)</label>
                <input type="text" id="name-1" placeholder="Empty = Not shooting">
            </div>
            <div class="input-group">
                <label>Archer 3 Name (Optional)</label>
                <input type="text" id="name-2" placeholder="Empty = Not shooting">
            </div>
            <div class="input-group">
                <label>Archer 4 Name (Optional)</label>
                <input type="text" id="name-3" placeholder="Empty = Not shooting">
            </div>
        </div>
        <button class="start-btn" onclick="startSession()">START SESSION</button>
    </div>
</div>

<div id="main-app">
    <div id="archer-tabs">
        <button class="settings-btn" onclick="toggleSetup(true)">⚙</button>
    </div>

    <div id="table-container">
        <div class="table-title">1st Half (Ends 1-6)</div>
        <table>
            <colgroup><col class="col-end"><col class="col-arr"><col class="col-arr"><col class="col-arr"><col class="col-sum"><col class="col-tot"><col class="col-run"><col class="col-stat"><col class="col-stat"></colgroup>
            <tbody id="body-1"></tbody>
        </table>
        <div class="table-title">2nd Half (Ends 7-12)</div>
        <table>
            <colgroup><col class="col-end"><col class="col-arr"><col class="col-arr"><col class="col-arr"><col class="col-sum"><col class="col-tot"><col class="col-run"><col class="col-stat"><col class="col-stat"></colgroup>
            <tbody id="body-2"></tbody>
        </table>
    </div>

    <div id="session-footer">
        <div class="foot-label" id="footer-name">TOTAL:</div>
        <div class="foot-sum"></div>
        <div class="foot-tot" id="gt-score">0</div>
        <div class="foot-run"></div>
        <div class="foot-stat" id="gt-10x">0</div>
        <div class="foot-stat" id="gt-x">0</div>
    </div>

    <div id="pad">
        <button class="pad-btn gold" onclick="handleInput('X')">X</button>
        <button class="pad-btn gold" onclick="handleInput(10)">10</button>
        <button class="pad-btn gold" onclick="handleInput(9)">9</button>
        <button class="pad-btn red" onclick="handleInput(8)">8</button>
        <button class="pad-btn red" onclick="handleInput(7)">7</button>
        <button class="pad-btn blue" onclick="handleInput(6)">6</button>
        <button class="pad-btn blue" onclick="handleInput(5)">5</button>
        <button class="pad-btn black" onclick="handleInput(4)">4</button>
        <button class="pad-btn black" onclick="handleInput(3)">3</button>
        <button class="pad-btn white" onclick="handleInput(2)">2</button>
        <button class="pad-btn white" onclick="handleInput(1)">1</button>
        <button class="pad-btn miss" onclick="handleInput('M')">M</button>
        <button class="pad-btn backspace" style="grid-column: span 4;" onclick="backspace()">BACKSPACE ←</button>
    </div>
</div>

<script>
    let archers = [];
    let currentIdx = 0;
    let editIndex = null;

    function startSession() {
        archers = [];
        for(let i=0; i<4; i++) {
            let nameVal = document.getElementById(`name-${i}`).value.trim();
            if(nameVal !== "" || i === 0) { // Always keep at least Archer 1
                archers.push({
                    name: nameVal || `Archer ${i+1}`,
                    scores: Array(72).fill(""),
                    cursor: 0
                });
            }
        }
        
        // Build Tabs
        let tabsHtml = '';
        archers.forEach((a, i) => {
            tabsHtml += `<button id="tab-${i}" class="tab-btn ${i===0?'active':''}" onclick="switchArcher(${i})">${a.name.toUpperCase()}</button>`;
        });
        tabsHtml += `<button class="settings-btn" onclick="toggleSetup(true)">⚙</button>`;
        document.getElementById('archer-tabs').innerHTML = tabsHtml;

        toggleSetup(false);
        switchArcher(0);
    }

    function toggleSetup(show) {
        document.getElementById('setup-screen').style.display = show ? 'flex' : 'none';
        document.getElementById('main-app').style.display = show ? 'none' : 'flex';
    }

    function switchArcher(idx) {
        currentIdx = idx;
        editIndex = null;
        document.querySelectorAll('.tab-btn').forEach((btn, i) => {
            btn.classList.toggle('active', i === idx);
        });
        document.getElementById('footer-name').innerText = archers[idx].name.toUpperCase() + " TOTAL:";
        render();
    }

    function render() {
        let archer = archers[currentIdx];
        let h1 = renderHalf(0, 6, "body-1", archer);
        let h2 = renderHalf(6, 12, "body-2", archer);
        document.getElementById('gt-score').innerText = h1.score + h2.score;
        document.getElementById('gt-10x').innerText = h1.tenX + h2.tenX;
        document.getElementById('gt-x').innerText = h1.xOnly + h2.xOnly;
        let target = document.querySelector('.editing-cell') || document.querySelector('.active-cell');
        if(target) target.scrollIntoView({behavior:'smooth', block:'center'});
    }

    function renderHalf(startEnd, endEnd, bodyId, archer) {
        const targetBody = document.getElementById(bodyId);
        let html = '';
        let halfRunning = 0, half10s = 0, halfXs = 0;

        for(let e = startEnd + 1; e <= endEnd; e++) {
            let sIdx = (e-1)*6;
            let a = archer.scores.slice(sIdx, sIdx + 6);
            let v = a.map(val => (val==='X'||val===10?10:val==='M'?0:Number(val)||0));
            let s1 = (a[0]!=="" && a[1]!=="" && a[2]!=="") ? v[0]+v[1]+v[2] : "";
            let s2 = (a[3]!=="" && a[4]!=="" && a[5]!=="") ? v[3]+v[4]+v[5] : "";
            let endTotal = s2 !== "" ? (Number(s1)||0) + s2 : "";
            if(endTotal !== "") halfRunning += endTotal;
            let countStats = (arr) => ({ tenX: arr.filter(x => x===10 || x==='X').length, xOnly: arr.filter(x => x==='X').length });
            let r1 = countStats(a.slice(0,3)); let r2 = countStats(a.slice(3,6));
            if(a[0]!==""||a[1]!==""||a[2]!=="") { half10s += r1.tenX; halfXs += r1.xOnly; }
            if(a[3]!==""||a[4]!==""||a[5]!=="") { half10s += r2.tenX; halfXs += r2.xOnly; }

            html += `<tr><td rowspan="2" class="end-label">End ${e}</td>${cellHtml(sIdx, a[0])}${cellHtml(sIdx+1, a[1])}${cellHtml(sIdx+2, a[2])}<td class="sum-box">${s1}</td><td class="no-entry"></td><td rowspan="2" class="running-sum-box">${endTotal !== "" ? halfRunning : ""}</td><td class="stat-box">${(a[0]!==""||a[1]!==""||a[2]!=="")?r1.tenX:""}</td><td class="stat-box">${(a[0]!==""||a[1]!==""||a[2]!=="")?r1.xOnly:""}</td></tr><tr class="end-sep">${cellHtml(sIdx+3, a[3])}${cellHtml(sIdx+4, a[4])}${cellHtml(sIdx+5, a[5])}<td class="sum-box">${s2}</td><td class="end-total-box">${endTotal}</td><td class="stat-box">${(a[3]!==""||a[4]!==""||a[5]!=="")?r2.tenX:""}</td><td class="stat-box">${(a[3]!==""||a[4]!==""||a[5]!=="")?r2.xOnly:""}</td></tr>`;
        }
        html += `<tr class="half-total-row"><td colspan="5">HALF TOTAL</td><td>${halfRunning}</td><td></td><td>${half10s}</td><td>${halfXs}</td></tr>`;
        targetBody.innerHTML = html;
        return { score: halfRunning, tenX: half10s, xOnly: halfXs };
    }

    function cellHtml(idx, val) {
        let archer = archers[currentIdx];
        let cls = (editIndex === idx) ? "editing-cell" : (editIndex === null && archer.cursor === idx) ? "active-cell" : "";
        return `<td class="${cls}" onclick="selectCell(${idx})">${val}</td>`;
    }

    function selectCell(idx) { editIndex = (editIndex === idx) ? null : idx; render(); }
  function handleInput(val) {
        let archer = archers[currentIdx];
        
        // 1. Handle the input for the current archer
        if (editIndex !== null) {
            archer.scores[editIndex] = val;
            editIndex = null;
        } else if (archer.cursor < 72) {
            archer.scores[archer.cursor] = val;
            archer.cursor++;
            
            // 2. CHECK FOR AUTOMATIC JUMP
            // If the arrow just entered was the 6th arrow of an end
            // and there is another archer in the list...
            if (archer.cursor % 6 === 0 && currentIdx < archers.length - 1) {
                render(); // Render current archer's last arrow first
                
                // Small delay so you can see the last score hit the table 
                // before it jumps to the next person
                setTimeout(() => {
                    switchArcher(currentIdx + 1);
                }, 100); 
                return; // Exit early so we don't render twice
            }
        }
        render();
    }
        render();
    }
        render();
    }
        render();
    }
    function backspace() {
        let archer = archers[currentIdx];
        if (editIndex !== null) { archer.scores[editIndex] = ""; editIndex = null; }
        else if (archer.cursor > 0) { archer.cursor--; archer.scores[archer.cursor] = ""; }
        render();
    }
</script>
</body>
</html>
