<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; height: 100vh; }
        
        #table-container { flex: 1; overflow: auto; background: white; color: black; padding: 5px; }
        
        .table-title { background: #333; color: white; font-size: 11px; padding: 6px; font-weight: bold; text-align: center; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 13px; margin-bottom: 20px; border: 1px solid black; }
        
        /* Box sizes - making arrow cells feel like your drawing */
        th, td { border: 1px solid #ccc; text-align: center; height: 32px; padding: 0; position: relative; }
        .row-label { background: #f0f0f0; width: 30px; font-weight: bold; font-size: 10px; border-right: 1px solid black; }
        .sum-box { background: #f9f9f9; width: 45px; border-left: 1px solid black; }
        .end-total-box { background: #e3f2fd; font-weight: bold; width: 50px; border-left: 1px solid black; }
        .running-sum-box { background: #fffde7; font-weight: bold; color: #d32f2f; width: 55px; border-left: 1px solid black; border-right: 1px solid black; }
        .stat-box { width: 35px; font-size: 11px; }

        .active-cell { background: #fff9c4 !important; border: 2px solid orange !important; z-index: 10; }

        /* The Diagonal X Box */
        .no-entry { 
            background-image: 
                linear-gradient(to bottom right, transparent calc(50% - 0.5px), #ddd, transparent calc(50% + 0.5px)),
                linear-gradient(to bottom left, transparent calc(50% - 0.5px), #ddd, transparent calc(50% + 0.5px));
        }

        /* Narrow Black Separator between Ends */
        .end-sep td { border-bottom: 1.5px solid black !important; }

        .half-total-row { background: #444; color: white; font-weight: bold; height: 35px; font-size: 12px; }

        #session-footer { background: #b71c1c; color: white; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; padding: 12px; font-weight: bold; font-size: 14px; text-align: center; }
        
        #pad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 10px; background: #2a2a2a; }
        button { padding: 16px 0; font-size: 22px; font-weight: bold; border-radius: 8px; border: none; box-shadow: 0 3px 0 #000; }
        button:active { transform: translateY(2px); box-shadow: none; opacity: 0.9; }
        
        .gold { background: #FFD700; color: black; }
        .red  { background: #FF4444; color: white; }
        .blue { background: #33AAFF; color: white; }
        .black { background: #333333; color: white; }
        .white { background: #FFFFFF; color: black; }
        .miss  { background: #888888; color: white; }
    </style>
</head>
<body>

<div id="table-container">
    <div class="table-title">1st Half (Ends 1-6)</div>
    <table id="table-1">
        <tbody id="body-1"></tbody>
    </table>

    <div class="table-title">2nd Half (Ends 7-12)</div>
    <table id="table-2">
        <tbody id="body-2"></tbody>
    </table>
</div>

<div id="session-footer">
    <span>SESSION:</span>
    <span id="gt-score">0</span>
    <span id="gt-10x">0</span>
    <span id="gt-x">0</span>
</div>

<div id="pad">
    <button class="gold" onclick="add('X')">X</button>
    <button class="gold" onclick="add(10)">10</button>
    <button class="gold" onclick="add(9)">9</button>
    <button class="red" onclick="add(8)">8</button>
    <button class="red" onclick="add(7)">7</button>
    <button class="blue" onclick="add(6)">6</button>
    <button class="blue" onclick="add(5)">5</button>
    <button class="black" onclick="add(4)">4</button>
    <button class="black" onclick="add(3)">3</button>
    <button class="white" onclick="add(2)">2</button>
    <button class="white" onclick="add(1)">1</button>
    <button class="miss" onclick="add('M')">M</button>
</div>

<script>
    let scores = [];
    
    function render() {
        let h1 = renderHalf(0, 6, "body-1");
        let h2 = renderHalf(6, 12, "body-2");

        document.getElementById('gt-score').innerText = h1.score + h2.score;
        document.getElementById('gt-10x').innerText = h1.tenX + h2.tenX;
        document.getElementById('gt-x').innerText = h1.xOnly + h2.xOnly;

        let next = document.querySelector('.active-cell');
        if(next) next.scrollIntoView({behavior:'smooth', block:'center'});
    }

    function renderHalf(startEnd, endEnd, bodyId) {
        const targetBody = document.getElementById(bodyId);
        let html = '';
        let halfRunning = 0;
        let half10s = 0;
        let halfXs = 0;

        for(let e = startEnd + 1; e <= endEnd; e++) {
            let start = (e-1)*6;
            let a = [0,1,2,3,4,5].map(i => scores[start+i] || "");
            let v = a.map(val => (val==='X'||val===10?10:val==='M'?0:Number(val)||0));
            
            let s1 = a[2]!=="" ? v[0]+v[1]+v[2] : "";
            let s2 = a[5]!=="" ? v[3]+v[4]+v[5] : "";
            let endTotal = s2 !== "" ? s1 + s2 : "";
            
            if(endTotal !== "") halfRunning += endTotal;

            let r1_10x = a.slice(0,3).filter(x => x===10 || x==='X').length;
            let r1_x   = a.slice(0,3).filter(x => x==='X').length;
            let r2_10x = a.slice(3,6).filter(x => x===10 || x==='X').length;
            let r2_x   = a.slice(3,6).filter(x => x==='X').length;
            
            half10s += (a[0]!==""?r1_10x:0) + (a[3]!==""?r2_10x:0);
            halfXs += (a[0]!==""?r1_x:0) + (a[3]!==""?r2_x:0);

            // Using class "end-sep" on the second row of each end to create the black line
            html += `
                <tr>
                    <td class="row-label">${e*2-1}</td>
                    <td id="c-${start}" class="${scores.length===start?'active-cell':''}">${a[0]}</td>
                    <td id="c-${start+1}" class="${scores.length===start+1?'active-cell':''}">${a[1]}</td>
                    <td id="c-${start+2}" class="${scores.length===start+2?'active-cell':''}">${a[2]}</td>
                    <td class="sum-box">${s1}</td><td class="no-entry"></td>
                    <td rowspan="2" class="running-sum-box">${endTotal !== "" ? halfRunning : ""}</td>
                    <td class="stat-box">${a[0]!==""?r1_10x:""}</td><td class="stat-box">${a[0]!==""?r1_x:""}</td>
                </tr>
                <tr class="end-sep">
                    <td class="row-label">${e*2}</td>
                    <td id="c-${start+3}" class="${scores.length===start+3?'active-cell':''}">${a[3]}</td>
                    <td id="c-${start+4}" class="${scores.length===start+4?'active-cell':''}">${a[4]}</td>
                    <td id="c-${start+5}" class="${scores.length===start+5?'active-cell':''}">${a[5]}</td>
                    <td class="sum-box">${s2}</td><td class="end-total-box">${endTotal}</td>
                    <td class="stat-box">${a[3]!==""?r2_10x:""}</td><td class="stat-box">${a[3]!==""?r2_x:""}</td>
                </tr>
            `;
        }
        
        html += `<tr class="half-total-row"><td colspan="5">HALF TOTAL</td><td>${halfRunning}</td><td></td><td>${half10s}</td><td>${halfXs}</td></tr>`;
        targetBody.innerHTML = html;
        return { score: halfRunning, tenX: half10s, xOnly: halfXs };
    }

    function add(v) {
        if(scores.length < 72) { scores.push(v); render(); }
    }
    render();
</script>
</body>
</html>
