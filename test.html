<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
  :root {
    --bg:#111; --surface:#1e1e1e; --surface2:#2a2a2a; --border:#383838;
    --accent:#FFD700; --red:#e53935; --blue:#1e88e5; --green:#43a047;
    --text:#f0f0f0; --muted:#888; --tab-active:#2196f3; --radius:10px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Barlow',sans-serif;margin:0;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100dvh;overflow:hidden;}

  /* SCREENS */
  .screen{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;opacity:1;transition:opacity 0.2s ease;z-index:10;}
  .screen.hidden{opacity:0;pointer-events:none;}

  .setup-card{background:var(--surface);padding:24px 20px;border-radius:16px;width:100%;max-width:360px;border:1px solid var(--border);}
  .setup-card h2{margin:0 0 16px;text-align:center;color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:2px;}

  .mode-btn{width:100%;padding:16px 20px;margin:6px 0;border-radius:var(--radius);border:none;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:1px;cursor:pointer;color:white;transition:transform 0.1s,filter 0.15s;display:flex;align-items:center;gap:12px;}
  .mode-btn:active{transform:scale(0.97);filter:brightness(0.9);}
  .out-btn{background:linear-gradient(135deg,#2e7d32,#388e3c);}
  .in-btn{background:linear-gradient(135deg,#1565c0,#1976d2);}
  .mode-btn .icon{font-size:22px;}.mode-btn .label{flex:1;text-align:left;}
  .mode-btn .sub{font-size:11px;font-weight:400;opacity:0.8;font-family:'Barlow',sans-serif;letter-spacing:0;}

  /* Input method toggle */
  .input-toggle{display:flex;gap:6px;margin:10px 0 4px;}
  .input-toggle-btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.5px;cursor:pointer;transition:all 0.15s;}
  .input-toggle-btn.active{background:var(--tab-active);border-color:var(--tab-active);color:#fff;}
  .input-toggle-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;display:block;}

  .history-link-btn{margin-top:14px;background:none;border:1px solid var(--border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;padding:11px 28px;border-radius:30px;cursor:pointer;}
  .history-link-btn:active{color:var(--text);border-color:var(--muted);}

  .input-group{margin-bottom:10px;}
  .input-group label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
  .input-group input{width:100%;padding:11px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;outline:none;transition:border-color 0.15s;}
  .input-group input:focus{border-color:var(--tab-active);}

  .back-link{background:none;border:none;color:var(--muted);font-family:'Barlow',sans-serif;font-size:14px;cursor:pointer;padding:8px 0;margin-bottom:10px;align-self:flex-start;}
  .start-btn{width:100%;padding:15px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;letter-spacing:1px;margin-top:8px;cursor:pointer;transition:transform 0.1s,filter 0.15s;}
  .start-btn:active{transform:scale(0.97);filter:brightness(0.9);}

  /* MAIN APP */
  #main-app{display:none;flex-direction:column;height:100dvh;width:100%;position:relative;z-index:5;}
  #archer-tabs{display:flex;background:var(--surface);padding:6px;gap:5px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .tab-btn{flex:1;min-width:0;padding:9px 4px;border:none;border-radius:6px;background:transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:background 0.15s,color 0.15s;}
  .tab-btn.active{background:var(--tab-active);color:#fff;}
  .settings-btn{width:36px;flex-shrink:0;background:transparent;color:var(--muted);border:none;border-radius:6px;font-size:16px;cursor:pointer;}

  #table-container{flex:1;overflow-y:auto;overflow-x:hidden;background:#fff;color:#111;}
  .half-header{display:grid;grid-template-columns:1fr 36px 36px;background:#444;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.5px;text-align:center;padding:3px 0;}
  .half-header .half-title{text-align:left;padding-left:10px;}
  table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px;border:1.5px solid #999;margin-bottom:0;}
  th,td{border:1px solid #ccc;text-align:center;height:32px;padding:0;position:relative;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;}
  .col-end{width:46px;}.col-arr{width:auto;}.col-sum{width:36px;}.col-tot{width:38px;}.col-run{width:46px;}.col-stat{width:32px;}
  .end-label{background:#f0f0f0;font-weight:700;font-size:10px;color:#333;border-right:1.5px solid #999;}
  .sum-box{background:#f5f5f5;border-left:1px solid #bbb;color:#555;font-size:12px;}
  .end-total-box{background:#e3f2fd;font-weight:700;border-left:1.5px solid #999;color:#1565c0;}
  .running-sum-box{background:#fff8e1;font-weight:700;color:#c62828;border-left:1.5px solid #999;border-right:1.5px solid #999;font-size:13px;}
  .stat-box{font-size:11px;color:#555;background:#fafafa;}
  .gold-hit{background-color:#fff9c4!important;color:#5d4037!important;font-weight:700;}
  .active-cell{background-color:#fff3e0!important;outline:2.5px solid #FF9800;outline-offset:-2px;z-index:10;}
  .editing-cell{background-color:#e3f2fd!important;outline:2.5px solid #2196f3;outline-offset:-2px;z-index:11;}
  .no-entry{background-image:repeating-linear-gradient(135deg,transparent,transparent 4px,#e0e0e0 4px,#e0e0e0 5px);}
  .end-sep td{border-bottom:1.5px solid #999!important;}
  .half-total-row{background:#37474f!important;color:#fff!important;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;height:30px;}
  .half-total-row td{border-color:#546e7a;color:#fff;}

  #session-footer{background:#b71c1c;color:#fff;display:flex;align-items:center;padding:0 8px;height:42px;border-top:2px solid #7f0000;flex-shrink:0;gap:4px;}
  .foot-label{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .foot-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;width:42px;text-align:center;background:rgba(0,0,0,0.2);border-radius:4px;padding:2px 0;}

  /* PAD */
  #pad{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:8px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
  .pad-btn{padding:0;height:52px;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;border-radius:8px;border:none;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,0.35);transition:transform 0.08s,box-shadow 0.08s,filter 0.1s;letter-spacing:0.5px;}
  .pad-btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,0.35);filter:brightness(0.92);}
  .gold{background:#FFD700;color:#3e2000;}.red{background:#e53935;color:white;}.blue{background:#1e88e5;color:white;}
  .black{background:#2d2d2d;color:white;border:1px solid #555;}.white{background:#f5f5f5;color:#111;border:1px solid #ccc;}
  .miss{background:#757575;color:white;}
  .backspace-btn{grid-column:span 4;background:#333;color:#aaa;font-size:16px;height:44px;}
  .save-hist-btn{grid-column:span 2;background:#1b5e20;color:#a5d6a7;font-size:13px;height:40px;}
  .export-btn{grid-column:span 2;background:#1a237e;color:#9fa8da;font-size:13px;height:40px;}

  /* TARGET FACE INPUT */
  #target-input{display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:10px 8px 8px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;gap:8px;}
  #target-wrap{position:relative;width:260px;height:260px;touch-action:none;user-select:none;}
  #target-canvas{border-radius:50%;display:block;cursor:crosshair;}
  #magnifier{position:absolute;width:90px;height:90px;border-radius:50%;border:3px solid #fff;pointer-events:none;display:none;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.7);top:-100px;left:0;}
  #mag-canvas{display:block;}
  #target-score-display{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--accent);letter-spacing:1px;min-height:34px;}
  #target-bottom-row{display:flex;gap:6px;width:100%;max-width:280px;}
  .tgt-btn{flex:1;height:42px;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,0.35);}
  .tgt-btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,0.35);}
  .tgt-miss{background:#757575;color:white;}
  .tgt-back{background:#333;color:#aaa;}
  .tgt-save-hist{background:#1b5e20;color:#a5d6a7;}
  .tgt-export{background:#1a237e;color:#9fa8da;}

  /* NEXT ARCHER BANNER */
  #next-archer-banner{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;flex-direction:column;}
  #next-archer-banner.show{display:flex;}
  .banner-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 32px;text-align:center;max-width:300px;width:90%;}
  .banner-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
  .banner-name{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;color:var(--accent);letter-spacing:1px;margin-bottom:4px;}
  .banner-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
  .banner-btn{width:100%;padding:14px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;cursor:pointer;}

  /* HISTORY SCREEN */
  #history-screen{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.3s ease;}
  #history-screen.open{transform:translateX(0);}
  .hist-header{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
  .hist-header h2{flex:1;margin:0;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:2px;color:var(--accent);}
  .hist-back-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px;}
  .hist-clear-btn{background:none;border:none;color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;padding:6px 10px;}
  #history-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
  .hist-empty{text-align:center;color:var(--muted);font-size:15px;margin-top:60px;line-height:1.8;}

  /* Compact history card */
  .hist-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;display:flex;flex-wrap:wrap;align-items:center;gap:6px;}
  .hist-card:active{background:var(--surface2);}
  .hist-card-meta{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted);white-space:nowrap;}
  .hist-card-date{font-size:11px;color:var(--muted);white-space:nowrap;}
  .hist-card-sep{color:var(--border);font-size:11px;}
  .hist-card-archers{display:flex;flex-wrap:wrap;gap:5px;flex:1;}
  .hist-archer-pill{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:2px 9px;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;}
  .hist-archer-pill span{color:var(--accent);margin-left:4px;}
  .hist-delete-btn{background:none;border:none;color:#555;font-size:17px;cursor:pointer;padding:2px 4px;margin-left:auto;flex-shrink:0;}
  .hist-delete-btn:active{color:var(--red);}

  /* DETAIL SCREEN */
  #detail-screen{position:fixed;inset:0;background:var(--bg);z-index:60;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.3s ease;}
  #detail-screen.open{transform:translateX(0);}
  #detail-content{flex:1;overflow-y:auto;background:#fff;color:#111;}
  .detail-summary{background:#37474f;color:#fff;padding:12px 16px;display:flex;gap:16px;align-items:center;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;}
  .detail-summary-score{font-size:42px;font-weight:900;color:var(--accent);line-height:1;}
  .detail-summary-info{flex:1;}
  .detail-summary-name{font-size:18px;font-weight:700;}
  .detail-summary-sub{font-size:12px;color:#aaa;margin-top:2px;}
  .detail-archer-tabs{display:flex;background:#455a64;overflow-x:auto;flex-shrink:0;}
  .detail-archer-tab{padding:10px 16px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#aaa;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
  .detail-archer-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

  /* Target snapshot in detail */
  .detail-target-wrap{padding:16px;background:#fff;display:flex;justify-content:center;}
</style>
</head>
<body>

<!-- MODE SCREEN -->
<div id="mode-screen" class="screen">
  <div class="setup-card">
    <h2>🏹 SELECT MODE</h2>
    <button class="mode-btn out-btn" onclick="selectMode('outdoor')">
      <span class="icon">☀️</span>
      <span class="label">OUTDOOR<br><span class="sub">72 arrows · 12 ends · 6 per end</span></span>
    </button>
    <button class="mode-btn in-btn" onclick="selectMode('indoor')">
      <span class="icon">🏛️</span>
      <span class="label">INDOOR<br><span class="sub">60 arrows · 20 ends · 3 per end</span></span>
    </button>
  </div>
  <button class="history-link-btn" onclick="openHistory()">📜 SESSION HISTORY</button>
</div>

<!-- SETUP SCREEN -->
<div id="setup-screen" class="screen hidden">
  <div class="setup-card">
    <button class="back-link" onclick="goBack()">← Back</button>
    <h2>ARCHER SETUP</h2>
    <div class="input-group"><label>Archer 1 Name</label><input type="text" id="name-0" value="Archer 1" autocomplete="off"></div>
    <div class="input-group"><label>Archer 2 <span style="color:#555">(optional)</span></label><input type="text" id="name-1" placeholder="Leave blank to skip" autocomplete="off"></div>
    <div class="input-group"><label>Archer 3 <span style="color:#555">(optional)</span></label><input type="text" id="name-2" placeholder="Leave blank to skip" autocomplete="off"></div>
    <div class="input-group"><label>Archer 4 <span style="color:#555">(optional)</span></label><input type="text" id="name-3" placeholder="Leave blank to skip" autocomplete="off"></div>
    <span class="input-toggle-label">Input Method</span>
    <div class="input-toggle">
      <button class="input-toggle-btn active" id="toggle-pad" onclick="setInputMethod('pad')">🎯 PAD</button>
      <button class="input-toggle-btn" id="toggle-target" onclick="setInputMethod('target')">🎯 TARGET FACE</button>
    </div>
    <button class="start-btn" onclick="startSession()">START SESSION →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app">
  <div id="archer-tabs"></div>
  <div id="table-container">
    <div class="half-header">
      <div class="half-title" id="h1-main-title">1st HALF</div>
      <div id="h1-s1"></div><div id="h1-s2"></div>
    </div>
    <table><colgroup id="col-group-1"></colgroup><tbody id="body-1"></tbody></table>
    <div class="half-header" style="margin-top:8px;">
      <div class="half-title" id="h2-main-title">2nd HALF</div>
      <div id="h2-s1"></div><div id="h2-s2"></div>
    </div>
    <table><colgroup id="col-group-2"></colgroup><tbody id="body-2"></tbody></table>
    <div style="height:12px;"></div>
  </div>
  <div id="session-footer">
    <div class="foot-label" id="footer-name">TOTAL:</div>
    <div class="foot-val" id="gt-score">0</div>
    <div class="foot-val" id="gt-stat1">0</div>
    <div class="foot-val" id="gt-stat2">0</div>
  </div>

  <!-- PAD INPUT -->
  <div id="pad">
    <button id="btn-x"  class="pad-btn gold"         onclick="handleInput('X')">X</button>
    <button             class="pad-btn gold"         onclick="handleInput(10)">10</button>
    <button             class="pad-btn gold"         onclick="handleInput(9)">9</button>
    <button             class="pad-btn red"          onclick="handleInput(8)">8</button>
    <button             class="pad-btn red"          onclick="handleInput(7)">7</button>
    <button             class="pad-btn blue"         onclick="handleInput(6)">6</button>
    <button             class="pad-btn blue"         onclick="handleInput(5)">5</button>
    <button             class="pad-btn black"        onclick="handleInput(4)">4</button>
    <button             class="pad-btn black"        onclick="handleInput(3)">3</button>
    <button             class="pad-btn white"        onclick="handleInput(2)">2</button>
    <button             class="pad-btn white"        onclick="handleInput(1)">1</button>
    <button             class="pad-btn miss"         onclick="handleInput('M')">M</button>
    <button             class="pad-btn backspace-btn" onclick="backspace()">BACKSPACE ←</button>
    <button             class="pad-btn save-hist-btn" onclick="saveToHistory()">💾 SAVE</button>
    <button             class="pad-btn export-btn"   onclick="exportCSV()">📤 EXPORT</button>
  </div>

  <!-- TARGET FACE INPUT -->
  <div id="target-input">
    <div id="target-score-display">Touch target</div>
    <div id="target-wrap">
      <canvas id="target-canvas" width="260" height="260"></canvas>
      <div id="magnifier"><canvas id="mag-canvas" width="90" height="90"></canvas></div>
    </div>
    <div id="target-bottom-row">
      <button class="tgt-btn tgt-miss"     onclick="handleInput('M')">MISS</button>
      <button class="tgt-btn tgt-back"     onclick="backspace()">← BACK</button>
      <button class="tgt-btn tgt-save-hist" onclick="saveToHistory()">💾</button>
      <button class="tgt-btn tgt-export"   onclick="exportCSV()">📤</button>
    </div>
  </div>
</div>

<!-- NEXT ARCHER BANNER -->
<div id="next-archer-banner">
  <div class="banner-card">
    <div class="banner-title">End complete — next up</div>
    <div class="banner-name" id="banner-name">—</div>
    <div class="banner-sub"  id="banner-sub"></div>
    <button class="banner-btn" onclick="dismissBanner()">READY →</button>
  </div>
</div>

<!-- HISTORY SCREEN -->
<div id="history-screen">
  <div class="hist-header">
    <button class="hist-back-btn" onclick="closeHistory()">←</button>
    <h2>HISTORY</h2>
    <button class="hist-clear-btn" onclick="clearAllHistory()">CLEAR ALL</button>
  </div>
  <div id="history-list"></div>
</div>

<!-- DETAIL SCREEN -->
<div id="detail-screen">
  <div class="hist-header">
    <button class="hist-back-btn" onclick="closeDetail()">←</button>
    <h2 id="detail-title">SESSION</h2>
    <div style="width:80px;"></div>
  </div>
  <div class="detail-archer-tabs" id="detail-archer-tabs"></div>
  <div class="detail-summary"     id="detail-summary"></div>
  <div id="detail-content"></div>
</div>

<script>
/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let archers=[], currentIdx=0, editIndex=null, sessionMode='outdoor', inputMethod='pad';
let pendingNextIdx=-1;
const SAVE_KEY='archery_session', HISTORY_KEY='archery_history';

/* ══════════════════════════════════════
   TARGET FACE
══════════════════════════════════════ */
const TGT_SIZE   = 260;
const TGT_CX     = TGT_SIZE/2;
const TGT_CY     = TGT_SIZE/2;
const TGT_RADIUS = TGT_SIZE/2 - 2;
const MAG_SIZE   = 90;
const MAG_ZOOM   = 3.5;

// rings: outdoor has X ring (innermost), indoor doesn't
// each ring: {score, color, ratio} ratio = outer edge fraction of total radius
const OUTDOOR_RINGS = [
  {score:'X', color:'#FFD700'},
  {score:10,  color:'#FFD700'},
  {score:9,   color:'#FFD700'},
  {score:8,   color:'#e53935'},
  {score:7,   color:'#e53935'},
  {score:6,   color:'#1e88e5'},
  {score:5,   color:'#1e88e5'},
  {score:4,   color:'#333'},
  {score:3,   color:'#333'},
  {score:2,   color:'#eee'},
  {score:1,   color:'#eee'},
];
const INDOOR_RINGS = [
  {score:10, color:'#FFD700'},
  {score:9,  color:'#FFD700'},
  {score:8,  color:'#e53935'},
  {score:7,  color:'#e53935'},
  {score:6,  color:'#1e88e5'},
  {score:5,  color:'#1e88e5'},
  {score:4,  color:'#333'},
  {score:3,  color:'#333'},
  {score:2,  color:'#eee'},
  {score:1,  color:'#eee'},
];

function getRings() { return sessionMode==='outdoor' ? OUTDOOR_RINGS : INDOOR_RINGS; }

function ringRadius(i) {
  const rings = getRings();
  return TGT_RADIUS * (i+1) / rings.length;
}

function drawTarget(ctx, size, rings, arrowDots, highlightPos) {
  const cx=size/2, cy=size/2, maxR=size/2-2;
  // draw rings from outside in
  for(let i=rings.length-1; i>=0; i--) {
    const r = maxR*(i+1)/rings.length;
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle = rings[i].color;
    ctx.fill();
    ctx.strokeStyle = (rings[i].color==='#eee'||rings[i].color==='#FFD700') ? '#bbb' : 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  // crosshair lines
  ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,size); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(size,cy); ctx.stroke();
  // X ring line for outdoor
  if(sessionMode==='outdoor'){
    const xR = maxR/rings.length;
    ctx.beginPath(); ctx.arc(cx,cy,xR,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1; ctx.stroke();
  }
  // existing arrow dots
  if(arrowDots) {
    arrowDots.forEach(d => {
      ctx.beginPath();
      ctx.arc(d.x*size, d.y*size, size*0.025, 0, Math.PI*2);
      ctx.fillStyle='rgba(0,0,0,0.75)';
      ctx.fill();
      ctx.strokeStyle='#fff';
      ctx.lineWidth=1;
      ctx.stroke();
    });
  }
  // live pointer dot
  if(highlightPos) {
    ctx.beginPath();
    ctx.arc(highlightPos.x*size, highlightPos.y*size, size*0.022, 0, Math.PI*2);
    ctx.fillStyle='white';
    ctx.fill();
    ctx.strokeStyle='#222';
    ctx.lineWidth=1.5;
    ctx.stroke();
  }
}

function drawMagnifier(touchX, touchY) {
  const tgtCanvas = document.getElementById('target-canvas');
  const mag = document.getElementById('magnifier');
  const magCtx = document.getElementById('mag-canvas').getContext('2d');
  const rect = tgtCanvas.getBoundingClientRect();
  const scaleX = TGT_SIZE/rect.width, scaleY = TGT_SIZE/rect.height;
  const cx = (touchX-rect.left)*scaleX;
  const cy = (touchY-rect.top)*scaleY;
  const srcSize = MAG_SIZE/MAG_ZOOM;
  magCtx.clearRect(0,0,MAG_SIZE,MAG_SIZE);
  magCtx.drawImage(tgtCanvas, cx-srcSize/2, cy-srcSize/2, srcSize, srcSize, 0, 0, MAG_SIZE, MAG_SIZE);
  // white dot in centre of magnifier
  magCtx.beginPath();
  magCtx.arc(MAG_SIZE/2, MAG_SIZE/2, 4, 0, Math.PI*2);
  magCtx.fillStyle='white';
  magCtx.fill();
  magCtx.strokeStyle='#333';
  magCtx.lineWidth=1.5;
  magCtx.stroke();
  // position magnifier above finger
  const wrapRect = document.getElementById('target-wrap').getBoundingClientRect();
  const lx = (touchX - wrapRect.left) - MAG_SIZE/2;
  const ly = (touchY - wrapRect.top) - MAG_SIZE - 20;
  mag.style.left = Math.max(0, Math.min(lx, TGT_SIZE-MAG_SIZE)) + 'px';
  mag.style.top  = Math.max(-MAG_SIZE, ly) + 'px';
  mag.style.display='block';
}

function scoreFromPos(nx, ny) {
  const dx=nx-0.5, dy=ny-0.5;
  const dist=Math.sqrt(dx*dx+dy*dy)*2; // 0=centre, 1=edge
  const rings=getRings();
  const idx=Math.floor(dist*rings.length);
  if(idx>=rings.length) return 'M';
  return rings[idx].score;
}

function initTargetCanvas() {
  const canvas = document.getElementById('target-canvas');
  const ctx = canvas.getContext('2d');
  redrawTarget(null);

  let touching = false, pendingScore = null, pendingNorm = null;

  function getPos(e) {
    const t = e.touches ? e.touches[0] : e;
    return {x: t.clientX, y: t.clientY};
  }

  function onMove(e) {
    e.preventDefault();
    if(!touching) return;
    const pos = getPos(e);
    const rect = canvas.getBoundingClientRect();
    const nx = (pos.x-rect.left)/rect.width;
    const ny = (pos.y-rect.top)/rect.height;
    pendingScore = scoreFromPos(nx, ny);
    pendingNorm = {x:nx, y:ny};
    redrawTarget({x:nx,y:ny});
    drawMagnifier(pos.x, pos.y);
    const disp = document.getElementById('target-score-display');
    disp.innerText = pendingScore===undefined ? '—' : String(pendingScore);
  }

  function onStart(e) {
    e.preventDefault();
    touching=true;
    onMove(e);
  }

  function onEnd(e) {
    e.preventDefault();
    if(!touching) return;
    touching=false;
    document.getElementById('magnifier').style.display='none';
    if(pendingScore!==null && pendingNorm!==null) {
      // store dot on current archer
      const archer=archers[currentIdx];
      if(!archer.arrowDots) archer.arrowDots=[];
      if(archer.cursor < archer.scores.length) {
        archer.arrowDots.push({x:pendingNorm.x, y:pendingNorm.y, score:pendingScore});
        handleInput(pendingScore);
      }
      pendingScore=null; pendingNorm=null;
    }
    redrawTarget(null);
    document.getElementById('target-score-display').innerText='Touch target';
  }

  canvas.addEventListener('touchstart', onStart, {passive:false});
  canvas.addEventListener('touchmove',  onMove,  {passive:false});
  canvas.addEventListener('touchend',   onEnd,   {passive:false});
  canvas.addEventListener('mousedown',  onStart);
  canvas.addEventListener('mousemove',  onMove);
  canvas.addEventListener('mouseup',    onEnd);
}

function redrawTarget(highlightPos) {
  const canvas = document.getElementById('target-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,TGT_SIZE,TGT_SIZE);
  const archer = archers[currentIdx];
  const dots = archer ? archer.arrowDots||[] : [];
  drawTarget(ctx, TGT_SIZE, getRings(), dots, highlightPos);
}

function renderTargetSnapshot(canvasEl, size, mode, dots) {
  const rings = mode==='outdoor' ? OUTDOOR_RINGS : INDOOR_RINGS;
  const ctx = canvasEl.getContext('2d');
  canvasEl.width = size; canvasEl.height = size;
  const savedMode = sessionMode;
  sessionMode = mode; // temp
  drawTarget(ctx, size, rings, dots, null);
  sessionMode = savedMode;
}

function saveSession() {
  localStorage.setItem(SAVE_KEY, JSON.stringify({archers, currentIdx, sessionMode, inputMethod}));
}
function clearSave() { localStorage.removeItem(SAVE_KEY); }
function getHistory() { try{return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');}catch(e){return[];} }
function setHistory(h) { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }

function calcStats(scores, mode) {
  const total=scores.reduce((s,v)=>s+(v==='X'||v===10?10:v==='M'?0:Number(v)||0),0);
  return { total, filled:scores.filter(s=>s!=='').length, tens:scores.filter(s=>s===10||s==='X').length, xs:scores.filter(s=>s==='X').length, nines:scores.filter(s=>s===9).length };
}

function saveToHistory() {
  const filled=archers[0].scores.filter(s=>s!=='').length;
  if(filled===0){alert('No scores to save yet!');return;}
  if(!confirm(`Save this session to history?\n(${filled} of ${sessionMode==='outdoor'?72:60} arrows)`)) return;
  _doSaveHistory();
  alert('Saved! ✓');
}

function autoSaveToHistory() {
  _doSaveHistory();
  clearSave();
  alert('Session complete! ✓ Saved to history automatically.');
}

function _doSaveHistory() {
  const now=new Date();
  const entry={
    id: Date.now(),
    date: now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}),
    time: now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),
    mode: sessionMode,
    inputMethod,
    archers: archers.map(a=>({
      name: a.name,
      scores: [...a.scores],
      stats: calcStats(a.scores, sessionMode),
      arrowDots: a.arrowDots ? [...a.arrowDots] : []
    }))
  };
  const h=getHistory(); h.unshift(entry); setHistory(h);
}

function roCellHtml(val){ const cls=(val==='X'||val===10||val===9)?'gold-hit':''; return `<td class="${cls}">${val}</td>`; }
function renderROOutdoor(scores,startEnd,endEnd,bodyId){

    if(et!=='')running+=et; const c10=a.filter(x=>x===10||x==='X').length,cx=a.filter(x=>x==='X').length;
    if(a[0]!==''){tens+=c10;xs+=cx;}
    html+=`<tr><td rowspan="2" class="end-label">End ${e}</td>${roCellHtml(a[0])}${roCellHtml(a[1])}${roCellHtml(a[2])}<td class="sum-box">${s1}</td><td class="no-entry"></td><td rowspan="2" class="running-sum-box">${et!==''?running:''}</td><td class="stat-box">${a[0]!==''?c10:''}</td><td class="stat-box">${a[0]!==''?cx:''}</td></tr><tr class="end-sep">${roCellHtml(a[3])}${roCellHtml(a[4])}${roCellHtml(a[5])}<td class="sum-box">${s2}</td><td class="end-total-box">${et}</td><td class="stat-box"></td><td class="stat-box"></td></tr>`;
  }
  html+=`<tr class="half-total-row"><td colspan="5">HALF TOTAL</td><td>${running}</td><td></td><td>${tens}</td><td>${xs}</td></tr>`;
  document.getElementById(bodyId).innerHTML=html;
}
function renderROIndoor(scores,startEnd,endEnd,bodyId){

    const sIdx=(e-1)*3,a=scores.slice(sIdx,sIdx+3),v=a.map(x=>x==='X'||x===10?10:x==='M'?0:Number(x)||0);
    const et=(a[0]!==''&&a[1]!==''&&a[2]!=='')?v[0]+v[1]+v[2]:'';

function renderIndoor(startEnd,endEnd,bodyId,archer){

  for(let e=startEnd+1;e<=endEnd;e++){
    const sIdx=(e-1)*3,a=archer.scores.slice(sIdx,sIdx+3),v=a.map(val=>val==='X'||val===10?10:val==='M'?0:Number(val)||0);
    const et=(a[0]!==''&&a[1]!==''&&a[2]!=='')?v[0]+v[1]+v[2]:'';
    if(et!=='')running+=et; const c10=a.filter(x=>x===10||x==='X').length,c9=a.filter(x=>x===9).length;
    if(a[0]!==''){tens+=c10;nines+=c9;}
    html+=`<tr class="end-sep"><td class="end-label">End ${e}</td>${cellHtml(sIdx,a[0])}${cellHtml(sIdx+1,a[1])}${cellHtml(sIdx+2,a[2])}<td class="end-total-box">${et}</td><td class="running-sum-box">${et!==''?running:''}</td><td class="stat-box">${a[0]!==''?c10:''}</td><td class="stat-box">${a[0]!==''?c9:''}</td></tr>`;
  }
  html+=`<tr class="half-total-row"><td colspan="4">HALF TOTAL</td><td>${running}</td><td></td><td>${tens}</td><td>${nines}</td></tr>`;
  document.getElementById(bodyId).innerHTML=html;
  return {score:running,s1:tens,s2:nines};
}

function cellHtml(idx,val){
  const archer=archers[currentIdx],classes=[];
  if(val==='X'||val===10||val===9) classes.push('gold-hit');
  if(editIndex===idx) classes.push('editing-cell');
  else if(editIndex===null&&archer.cursor===idx) classes.push('active-cell');
  return `<td class="${classes.join(' ')}" onclick="selectCell(${idx})">${val}</td>`;
}

function selectCell(idx){ editIndex=(editIndex===idx)?null:idx; render(); }

function handleInput(val){
  const archer=archers[currentIdx], step=sessionMode==='outdoor'?6:3;
  if(editIndex!==null){ archer.scores[editIndex]=val; editIndex=null; render(); saveSession(); return; }
  if(archer.cursor>=archer.scores.length) return;
  archer.scores[archer.cursor]=val; archer.cursor++;
  saveSession();
  const totalArrows=sessionMode==='outdoor'?72:60;
  if(archers.every(a=>a.cursor>=totalArrows)){ render(); autoSaveToHistory(); return; }
  if(archer.cursor%step===0){ render(); if(archers.length>1) showBanner((currentIdx+1)%archers.length); return; }
  render();
}

function showBanner(nextIdx){
  pendingNextIdx=nextIdx;
  document.getElementById('banner-name').innerText=archers[nextIdx].name.toUpperCase();
  document.getElementById('banner-sub').innerText=`End ${Math.floor(archers[nextIdx].cursor/(sessionMode==='outdoor'?6:3))+1}`;
  document.getElementById('next-archer-banner').classList.add('show');
}
function dismissBanner(){
  document.getElementById('next-archer-banner').classList.remove('show');
  if(pendingNextIdx>=0){ switchArcher(pendingNextIdx); pendingNextIdx=-1; }
}

function backspace(){
  const archer=archers[currentIdx];
  if(editIndex!==null){ archer.scores[editIndex]=''; editIndex=null; }
  else if(archer.cursor>0){
    archer.cursor--;
    archer.scores[archer.cursor]='';
    if(inputMethod==='target'&&archer.arrowDots&&archer.arrowDots.length>0){
      archer.arrowDots.pop();
      redrawTarget(null);
    }
  }
  saveSession(); render();
}

function exportCSV(){
  const archer=archers[currentIdx];
  let csv='data:text/csv;charset=utf-8,ARCHER: '+archer.name.toUpperCase()+'\n\n';
  if(sessionMode==='outdoor'){
    csv+='End,A1,A2,A3,Sum1,A4,A5,A6,Sum2,Total,10+X,X\n';
    for(let i=0;i<12;i++){
      const r=archer.scores.slice(i*6,i*6+6),v=r.map(x=>x==='X'||x===10?10:x==='M'?0:Number(x)||0);
      csv+=`${i+1},${r.join(',')},${v[0]+v[1]+v[2]},${v[3]+v[4]+v[5]},${v.reduce((a,b)=>a+b,0)},${r.filter(x=>x===10||x==='X').length},${r.filter(x=>x==='X').length}\n`;
    }
  } else {
    csv+='End,A1,A2,A3,Total,10s,9s\n';
    for(let i=0;i<20;i++){
      const r=archer.scores.slice(i*3,i*3+3),v=r.map(x=>x==='X'||x===10?10:x==='M'?0:Number(x)||0);
      csv+=`${i+1},${r.join(',')},${v.reduce((a,b)=>a+b,0)},${r.filter(x=>x===10||x==='X').length},${r.filter(x=>x===9).length}\n`;
    }
  }
  const link=document.createElement('a');
  link.setAttribute('href',encodeURI(csv));
  link.setAttribute('download',`${archer.name}_Scorecard.csv`);
  link.click();
}

/* ══════════════════════════════════════
   RESTORE ON LOAD
══════════════════════════════════════ */
function restoreSession(saved){
  archers=saved.archers; currentIdx=saved.currentIdx; sessionMode=saved.sessionMode;
  inputMethod=saved.inputMethod||'pad';
  // ensure arrowDots arrays exist
  archers.forEach(a=>{ if(!a.arrowDots) a.arrowDots=[]; });
  document.getElementById('btn-x').style.display=sessionMode==='indoor'?'none':'';
  setupTableCols();
  document.getElementById('mode-screen').classList.add('hidden');
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('main-app').style.display='flex';
  applyInputMethod();
  if(inputMethod==='target') initTargetCanvas();
  switchArcher(currentIdx);
}

window.addEventListener('load',()=>{
  const raw=localStorage.getItem(SAVE_KEY);
  if(raw){
    try{
      const saved=JSON.parse(raw);
      if(saved&&saved.archers&&saved.archers.length>0){
        const filled=saved.archers[0].scores.filter(s=>s!=='').length;
        if(filled>0&&confirm(`Restore session for "${saved.archers[0].name}"?\n(${filled} arrows entered)`)){
          restoreSession(saved); return;
        } else { clearSave(); }
      }
    }catch(e){ clearSave(); }
  }
});
</script>
